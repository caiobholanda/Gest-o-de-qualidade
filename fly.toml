app = "gestao-qualidade-granmarquise"
primary_region = "gru"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  PESQUISA_URL = "https://pesquisa-satisfacao.fly.dev"

[mounts]
  source = "gq_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
