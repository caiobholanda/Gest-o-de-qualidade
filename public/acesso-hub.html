<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso pelo Hub — Gestão da Qualidade</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%239C5843'/><text x='16' y='23' font-size='19' fill='white' font-family='Georgia,serif' text-anchor='middle'>G</text></svg>">
<link rel="preconnect" href="https://letsimage.s3.amazonaws.com">
<style>
  :root {
    --paper: #ECE4D2;
    --surface: #FAF9F5;
    --ink: #202C28;
    --ink-soft: #996442;
    --gold: #9C5843;
    --gold-hover: #7A4334;
    --line: rgba(32,44,40,.12);
    --muted: #7A6B5A;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 30px 60px -20px rgba(32,44,40,.18), 0 2px 6px rgba(32,44,40,.04);
    max-width: 460px;
    width: 100%;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
  }
  .logo {
    width: 168px;
    margin: 0 auto 1.5rem;
    display: block;
  }
  .gold-rule {
    width: 56px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
  }
  .badge-sistema {
    display: inline-block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .65rem;
    letter-spacing: .28em;
    text-transform: uppercase;
    color: var(--gold);
    background: rgba(156,88,67,.10);
    padding: .35rem .9rem;
    border-radius: 999px;
    margin-bottom: 1.5rem;
    font-weight: 500;
  }
  h1 {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-weight: 300;
    font-size: 1.85rem;
    margin: 0 0 .75rem;
    color: var(--ink);
    letter-spacing: -.01em;
    line-height: 1.15;
  }
  p.lead {
    color: var(--ink-soft);
    font-size: .95rem;
    line-height: 1.6;
    margin: 0 0 1.75rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .65rem;
    background: var(--gold);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: .95rem 1.85rem;
    font-size: .95rem;
    font-weight: 600;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    cursor: pointer;
    text-decoration: none;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 4px 12px -2px rgba(156,88,67,.35);
    letter-spacing: .01em;
  }
  .btn:hover { background: #B56B52; transform: translateY(-1px); box-shadow: 0 8px 20px -4px rgba(156,88,67,.40); }
  .btn:active { background: var(--gold-hover); transform: translateY(0); box-shadow: 0 2px 6px -1px rgba(156,88,67,.25); }
  .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
  .hint {
    margin-top: 1.5rem;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .08em;
  }
  @media (max-width: 480px) {
    .card { padding: 2.25rem 1.5rem 2rem; }
    h1 { font-size: 1.55rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="gold-rule"></div>
    <span class="badge-sistema">Gestão da Qualidade</span>
    <h1>Faça login pelo Hub</h1>
    <p class="lead">O acesso ao painel de Gestão da Qualidade é centralizado no Hub Gran Marquise. Clique abaixo para entrar.</p>
    <a id="btn-hub" class="btn" href="#">
      Acessar via Hub
      <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
    <div class="hint">hub-granmarquise.fly.dev</div>
  </div>
<script>
  (function () {
    document.getElementById('btn-hub').href = 'https://hub-granmarquise.fly.dev';
  })();
</script>
</body>
</html>
