<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acesso pelo Hub — Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F4EEE1;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:grid;place-items:center;padding:20px}
.card{background:#FAF9F5;border:1px solid rgba(96,87,56,.13);border-radius:18px;box-shadow:0 8px 40px rgba(138,107,31,.12);padding:52px 48px;width:100%;max-width:400px;text-align:center}
.monogram{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:3rem;color:#8A6B1F;line-height:1}
.brand-line{width:48px;height:2px;background:#8A6B1F;margin:10px auto 12px}
.brand-name{font-family:'Fraunces',serif;font-weight:500;font-size:1.05rem;color:#1C2030}
.brand-sub{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:.88rem;color:#605738;margin-top:2px}
.msg{margin-top:28px;font-size:.9rem;color:#605738;line-height:1.6}
.btn{display:inline-block;margin-top:24px;padding:13px 28px;background:#8A6B1F;color:#FAF9F5;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:600;border:none;border-radius:10px;cursor:pointer;text-decoration:none;transition:background .2s}
.btn:hover{background:#6F551A}
.footer{margin-top:28px;font-size:.72rem;color:#A09070}
</style>
</head>
<body>
<div class="card">
  <div class="monogram">GM</div>
  <div class="brand-line"></div>
  <div class="brand-name">Gran Marquise</div>
  <div class="brand-sub">Gestão da Qualidade</div>
  <div class="msg">O acesso a este sistema é feito pelo Hub de Sistemas do hotel.</div>
  <a class="btn" href="https://hub-granmarquise.fly.dev">Acessar pelo Hub</a>
  <div class="footer">Acesso restrito — Hotel Gran Marquise</div>
</div>
</body>
</html>
