<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestão da Qualidade — Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%239C5843'/><text x='16' y='23' font-size='19' fill='white' font-family='Georgia,serif' text-anchor='middle'>G</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
[data-theme="light"]{
  --bg:#EDE5D3;--surface:#FAF8F3;--surface2:#E8E0CE;
  --header-bg:rgba(250,248,243,0.96);
  --grad1:rgba(156,88,67,.08);--grad2:rgba(156,88,67,.04);
  --border:rgba(110,95,78,.18);--border-soft:rgba(110,95,78,.09);
  --text:#1C2820;--muted:#7A6B5A;--muted2:#8B6040;
  --gold:#9C5843;--gold-dark:#7E4636;--gold-dim:rgba(156,88,67,.11);--gold-dim2:rgba(156,88,67,.05);
  --success:#15705A;--success-dim:rgba(21,112,90,.11);
  --warn:#996442;--warn-dim:rgba(153,100,66,.11);
  --danger:#B85450;--danger-dim:rgba(184,84,80,.09);
}
[data-theme="dark"]{
  --bg:#181F1C;--surface:#222D28;--surface2:#131A17;
  --header-bg:rgba(24,31,28,0.97);
  --grad1:rgba(156,88,67,.11);--grad2:rgba(156,88,67,.05);
  --border:rgba(220,210,195,.14);--border-soft:rgba(220,210,195,.07);
  --text:#E8E0CE;--muted:#6E6055;--muted2:#B09070;
  --gold:#A86250;--gold-dark:#C07860;--gold-dim:rgba(168,98,80,.17);--gold-dim2:rgba(168,98,80,.07);
  --success:#22C46A;--success-dim:rgba(34,196,106,.13);
  --warn:#A07238;--warn-dim:rgba(160,114,56,.16);
  --danger:#D06058;--danger-dim:rgba(208,96,88,.15);
}
html,body{height:100%;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{
  background:
    radial-gradient(ellipse 1400px 700px at -5% -15%,var(--grad1),transparent 60%),
    radial-gradient(ellipse 900px 600px at 105% 10%,var(--grad2),transparent 55%),
    var(--bg);
  color:var(--text);min-height:100vh
}

/* ── Header ── */
.hdr{
  position:sticky;top:0;z-index:100;
  height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;
  background:var(--header-bg);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border-soft)
}
.hdr-brand{display:flex;align-items:center;gap:0;text-decoration:none}
.hdr-brand img{height:26px;width:auto;opacity:.9;transition:opacity .2s}
[data-theme="dark"] .hdr-brand img{filter:brightness(0) invert(1);opacity:.8}
.hdr-brand:hover img{opacity:1}
.hdr-sep{width:1px;height:18px;background:var(--border);margin:0 16px;flex-shrink:0}
.hdr-brand em{
  font-family:'Helvetica Neue',Arial,sans-serif;font-style:normal;font-weight:400;
  font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)
}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-ts{
  font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted);
  background:var(--surface2);border:1px solid var(--border-soft);
  border-radius:6px;padding:4px 10px;letter-spacing:.03em
}
.btn-icon{
  background:none;border:1px solid var(--border-soft);border-radius:7px;
  padding:6px 10px;cursor:pointer;color:var(--muted);font-size:.8rem;
  transition:border-color .18s,color .18s;line-height:1
}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.btn-sair{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);background:transparent;
  border:1px solid var(--border-soft);border-radius:7px;
  padding:7px 14px;cursor:pointer;transition:border-color .18s,color .18s
}
.btn-sair:hover{border-color:var(--gold);color:var(--gold)}
.btn-nova-pesquisa{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#F5EFE5;background:var(--gold);border:none;
  border-radius:7px;padding:8px 18px;cursor:pointer;
  transition:background .18s,transform .1s;white-space:nowrap
}
.btn-nova-pesquisa:hover{background:var(--gold-dark)}
.btn-nova-pesquisa:active{transform:scale(.97)}

/* ── Tabs ── */
.tabs{
  display:flex;gap:0;padding:0 48px;
  border-bottom:1px solid var(--border-soft);
  background:var(--header-bg);
  backdrop-filter:blur(24px)
}
.tab{
  padding:13px 0 11px;margin-right:28px;
  font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);border-bottom:2px solid transparent;
  margin-bottom:-1px;cursor:pointer;transition:color .18s,border-color .18s
}
.tab.tab-active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.tab-active){color:var(--gold-dark)}

/* ── Overview ── */
.ov-hero-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:52px}
.ov-hero{border:1px solid var(--border);border-radius:16px;padding:28px 28px 22px;display:flex;flex-direction:column;gap:14px}
.ov-hero-val{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:200;font-size:4rem;line-height:1;color:var(--text);letter-spacing:-.03em}
.ov-hero-val span{font-size:2rem;color:var(--gold);font-weight:300}
.ov-hero-sub{font-size:.7rem;color:var(--muted)}
.ov-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.ov-stat{background:var(--surface2);border-radius:9px;padding:12px 14px;display:flex;flex-direction:column;gap:3px}
.ov-stat-val{font-family:'JetBrains Mono',monospace;font-size:1.35rem;font-weight:500;color:var(--text)}
.ov-stat-label{font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.ov-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:56px}
.ov-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:13px;padding:20px 20px 16px;display:flex;flex-direction:column;gap:9px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.ov-card:hover{border-color:var(--border);box-shadow:0 4px 28px var(--gold-dim)}
.ov-card-label{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--muted)}
.ov-card-total{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:2rem;line-height:1;color:var(--text)}
.ov-card-mes{font-size:.7rem;color:var(--muted)}
.ov-progress-label{display:flex;justify-content:space-between;font-size:.58rem;color:var(--muted);margin-bottom:5px}
.ov-progress-bar{height:4px;border-radius:2px;background:var(--border-soft);overflow:hidden}
.ov-progress-fill{height:100%;border-radius:2px;background:var(--warn);transition:width .6s cubic-bezier(.16,1,.3,1)}
.ov-progress-fill.ok{background:var(--success)}
.ov-progress-fill.mid{background:var(--gold)}

/* ── Layout ── */
.main{max-width:1260px;margin:0 auto;padding:52px 48px 100px}
.eyebrow{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;font-weight:700;color:var(--muted)}

/* ── KPI grid ── */
.kpis-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.kpi-grid{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr 1.2fr;gap:14px;margin-bottom:80px}
.kpi{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:14px;padding:22px 24px;
  display:flex;flex-direction:column;justify-content:space-between;gap:16px;
  transition:border-color .2s,box-shadow .2s
}
.kpi:hover{border-color:var(--border);box-shadow:0 4px 28px var(--gold-dim)}
.kpi.hero{
  border-radius:16px;border-color:var(--border);
  padding:28px 30px 24px;
  background:linear-gradient(140deg,var(--surface) 0%,var(--gold-dim2) 100%);
  box-shadow:0 6px 32px var(--gold-dim)
}
.kpi.warn{
  background:linear-gradient(160deg,var(--gold-dim2),transparent 65%),var(--surface);
  border-color:rgba(156,88,67,.22)
}
.kpi-label{font-size:.59rem;letter-spacing:.15em;text-transform:uppercase;font-weight:700;color:var(--muted)}
.kpi-warn-label{display:flex;align-items:center;gap:8px}
.kpi-warn-dot{
  width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;
  animation:dotPulse 2.6s ease-in-out infinite
}
@keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.7)}}
.kpi-warn-label .kpi-label{color:var(--gold-dark)}
.kpi-hero-val{
  font-family:'Helvetica Neue',Arial,sans-serif;font-weight:200;
  font-size:4.2rem;line-height:1;color:var(--text);margin-top:12px;letter-spacing:-.03em
}
.kpi-hero-val span{font-size:2.1rem;color:var(--gold);font-weight:300}
.kpi-hero-line{width:28px;height:2px;background:var(--gold);margin-top:12px;opacity:.6}
.kpi-hero-sub{font-size:.7rem;color:var(--muted);margin-top:8px;letter-spacing:.03em}
.kpi-val{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:2rem;line-height:1;color:var(--text);letter-spacing:-.01em}
.kpi-val span{font-size:1.1rem;color:var(--muted);margin-left:2px}
.kpi-warn-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:2rem;line-height:1;color:var(--gold-dark)}
.kpi-sub{font-size:.64rem;color:var(--muted);margin-top:5px;letter-spacing:.02em}
.kpi-warn-sub{font-size:.64rem;color:var(--muted);margin-top:5px}

/* ── Sections ── */
.sec-hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:8px}
.sec-hdr-left{display:flex;align-items:baseline;gap:16px}
.sec-num{
  font-family:'Helvetica Neue',Arial,sans-serif;font-weight:200;
  font-size:4rem;line-height:.86;color:var(--gold);opacity:.35;letter-spacing:-.04em
}
.sec-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:400;font-size:1.65rem;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.sec-legend{display:flex;gap:18px;padding-bottom:6px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.66rem;color:var(--muted);letter-spacing:.03em}
.legend-swatch{width:12px;height:7px;border-radius:2px;flex-shrink:0}
.sec-divider{height:1px;background:var(--border-soft);margin-bottom:28px}

/* ── Question rows ── */
.q-list{display:flex;flex-direction:column;margin-bottom:80px}
.q-row{
  display:grid;grid-template-columns:380px 1fr 130px;align-items:center;gap:32px;
  padding:16px 12px;border-radius:10px;
  border-bottom:1px solid var(--border-soft);transition:background .15s
}
.q-row:hover{background:var(--surface)}
.q-text{font-size:.9rem;color:var(--text);line-height:1.45;letter-spacing:.005em}
.q-bar{display:flex;gap:2px;height:10px;border-radius:4px;overflow:hidden}
.q-seg{border-radius:0}
.q-seg:first-child{border-radius:4px 0 0 4px}
.q-seg:last-child{border-radius:0 4px 4px 0}
.q-seg:only-child{border-radius:4px}
.q-nota{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:300;font-size:1.55rem;color:var(--text);text-align:right;letter-spacing:-.02em}
.q-resp{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--muted);margin-top:3px;text-align:right}

/* ── Comments ── */
.comment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:80px}
.comment-col-label{font-size:.59rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:12px}
.comment-cards{display:flex;flex-direction:column;gap:12px}
.comment-card{
  background:var(--surface);border:1px solid var(--border-soft);
  border-radius:12px;padding:18px 20px 14px;transition:all .2s
}
.comment-card:hover{border-color:var(--border);box-shadow:0 6px 24px var(--gold-dim);transform:translateY(-2px)}
.comment-qm{font-family:Georgia,serif;font-size:2.6rem;line-height:.85;color:var(--gold);opacity:.45;margin-bottom:4px}
.comment-text{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-size:.97rem;color:var(--text);line-height:1.5;margin-bottom:10px}
.comment-meta{font-size:.59rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.comment-meta .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none}

/* ── Filters ── */
.filter-label{font-size:.59rem;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:var(--muted);margin-bottom:12px}
.filter-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:18px 20px;margin-bottom:12px;
  display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;
  box-shadow:0 2px 16px var(--gold-dim)
}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group .fl{font-size:.59rem;letter-spacing:.13em;text-transform:uppercase;font-weight:700;color:var(--muted)}
.fi{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border-soft);
  border-radius:8px;padding:9px 14px;transition:border-color .18s
}
.fi:focus-within{border-color:var(--gold)}
.fi input,.fi select{background:none;border:none;outline:none;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;color:var(--text);cursor:pointer}
.fi select option{background:var(--surface);color:var(--text)}
.filter-flex{flex:1;min-width:200px}
.btn-gold{
  font-family:'Helvetica Neue',Arial,sans-serif;
  font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:#F5EFE5;background:var(--gold);border:none;
  border-radius:8px;padding:12px 28px;cursor:pointer;
  transition:background .18s,transform .1s;align-self:flex-end
}
.btn-gold:hover{background:var(--gold-dark)}
.btn-gold:active{transform:scale(.98)}

/* ── Chips ── */
.chips{display:flex;gap:8px;margin-bottom:44px;flex-wrap:wrap;min-height:24px}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--gold-dim);border:1px solid rgba(156,88,67,.18);
  border-radius:999px;padding:4px 12px;
  font-size:.67rem;color:var(--gold-dark);font-weight:600;letter-spacing:.04em
}
.chip-x{cursor:pointer;opacity:.55;transition:opacity .2s}
.chip-x:hover{opacity:1}

/* ── Table ── */
.kpis-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px}
.tbl-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.tbl-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:400;font-size:1.4rem;color:var(--text);letter-spacing:-.01em}
.tbl-count{font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--muted)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 24px var(--gold-dim)}
.tbl-head{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl-head div{font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border-soft);transition:background .15s;cursor:pointer}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--gold-dim2)}
.tbl-date{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}
.tbl-nome{font-size:.86rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-email{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-tipo span{display:inline-block;font-size:.65rem;font-weight:600;letter-spacing:.03em;color:var(--muted);border:1px solid var(--border-soft);border-radius:999px;padding:3px 10px;background:var(--surface2)}
.tbl-orig{font-size:.8rem;color:var(--muted)}
.score{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;letter-spacing:.03em;border-radius:6px;padding:4px 10px;min-width:46px;text-align:center;border:1px solid transparent}
.score.alto{color:var(--success);background:var(--success-dim)}
.score.medio{color:var(--gold-dark);background:var(--gold-dim)}
.score.baixo{color:var(--danger);background:var(--danger-dim)}
.score.nenhum{color:var(--muted);background:transparent;border-color:var(--border-soft)}
.score.warn{color:var(--warn);background:var(--warn-dim)}
.tbl-ver span{font-size:.66rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--gold);cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.tbl-ver span:hover{border-bottom-color:var(--gold)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.88rem}

/* ── Picker overlay ── */
#psOverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(6px);display:none;overflow-y:auto}
#pickerOverlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:24px}
#pickerOverlay.open{display:flex}
#pickerModal{
  background:var(--surface);border:1px solid var(--border);
  border-radius:18px;padding:32px 28px 24px;width:100%;max-width:460px;
  box-shadow:0 48px 120px rgba(0,0,0,.4);position:relative
}
[data-theme="dark"] #pickerModal{background:#1A2420}
#pickerModal .picker-title{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin:0 0 20px}
#pickerModal .picker-close{position:absolute;top:16px;right:16px;background:none;border:1px solid var(--border-soft);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:.75rem;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .18s;line-height:1}
#pickerModal .picker-close:hover{border-color:var(--gold);color:var(--gold)}
#pickerModal .picker-list{display:flex;flex-direction:column;gap:5px}
#pickerModal .picker-item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;border-radius:10px;border:1px solid var(--border-soft);background:none;cursor:pointer;text-align:left;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.88rem;font-weight:400;color:var(--text);transition:background .15s,border-color .15s}
#pickerModal .picker-item:hover:not(.picker-soon){background:var(--gold-dim);border-color:rgba(156,88,67,.25)}
#pickerModal .picker-item.picker-soon{cursor:default;opacity:.4}
#pickerModal .picker-badge{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:var(--surface2);border-radius:4px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
#pickerModal .picker-arrow{color:var(--gold);flex-shrink:0;font-size:.85rem;opacity:.7}

/* ── psModal (survey forms — own variable scope, kept intact) ── */
#psModal{--bg:#ECE4D2;--bg-alt:#E3DACC;--bg-surf:#F5EFE2;--fg:#1A1A1A;--fg-2:#4A4A4A;--fg-3:#6B6B6B;--fg-4:#9B9B9B;--border:#B8B8B8;--bord-s:#C8B89A;--gold:#9C5843;--gold-s:#996442;--gold-d:#7A4334;--ui:#9C5843;--ui-soft:#996442;--ui-dark:#7A4334;--err:#B85450;background:var(--bg);color:var(--fg);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;width:100%;max-width:820px;margin:0 auto;box-shadow:0 24px 80px rgba(0,0,0,.35);position:relative}
[data-theme="dark"] #psModal{--bg:#202C28;--bg-alt:#293630;--bg-surf:#2F3D38;--fg:#ECE4D2;--fg-2:#C8B89A;--fg-3:#8A7B6A;--fg-4:#6A5E56;--border:#3F524B;--bord-s:#4A5E57;--gold:#C4916A;--gold-s:#B87A52;--gold-d:#B87060;--ui:#C4916A;--ui-soft:#B87A52;--ui-dark:#B87060}
.ps-sticky-hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 24px 12px;transition:background .6s cubic-bezier(0.16,1,0.3,1)}
.ps-sticky-top{max-width:720px;margin:0 auto 8px;display:flex;align-items:center;justify-content:flex-end}

@keyframes psSmBounce{0%{transform:translateY(0)}45%{transform:translateY(-3px)}100%{transform:translateY(0)}}

#psModal .radio-dot{width:18px;height:18px;border-radius:9999px;border:1.5px solid var(--border);position:relative;flex:none;margin-top:2px;transition:border-color .35s cubic-bezier(0.16,1,0.3,1)}

<body data-theme="light">

<header class="hdr">
  <a class="hdr-brand" href="https://hub-granmarquise.fly.dev" target="_blank" rel="noopener">
    <img src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="hdr-sep"></div>
    <em>Gestão da Qualidade</em>
  </a>
  <div class="hdr-right">
    <span class="hdr-ts" id="ts"></span>
    <button class="btn-nova-pesquisa" id="btnNovaPesquisa">+ Nova Pesquisa</button>
    <button class="btn-icon" id="btnTheme" title="Alternar tema">☾</button>
    <button class="btn-sair" onclick="location.href='/api/logout'">Sair</button>
  </div>
</header>

<div class="tabs">
  <div class="tab tab-active" data-tab="overview">Visão Geral</div>
  <div class="tab" data-tab="spa">Gran SPA</div>
  <div class="tab" data-tab="geral">Geral da Qualidade</div>
  <div class="tab" data-tab="pdvs">PDVs</div>
  <div class="tab" data-tab="eventos">Eventos</div>
</div>

<main class="main" id="main"><div class="empty">Carregando...</div></main>

<script>
(function(){
'use strict';
const body = document.body;
const saved = localStorage.getItem('gq_theme') || (document.cookie.match(/(?:^|;\s*)gq_theme=([^;]+)/)||[])[1] || 'light';
body.setAttribute('data-theme', saved);
const btn = document.getElementById('btnTheme');
btn.textContent = saved === 'dark' ? '☀' : '☾';
btn.onclick = () => {
  const t = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', t);
  localStorage.setItem('gq_theme', t);
  btn.textContent = t === 'dark' ? '☀' : '☾';
};

function updateTs() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('ts').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} · ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
updateTs(); setInterval(updateTs, 60000);

const LIMIT=20;
const METAS={spa:30,geral:20,pdvs:15,eventos:10};
const state = { from:'', to:'', tipo:'', origem:'', q:'', page:1, totalPages:1, periodCustom:false };
(function(){
  try {
    const s=JSON.parse(localStorage.getItem('gq_filters')||'{}');
    ['from','to','tipo','origem','q','periodCustom'].forEach(k=>{ if(k in s) state[k]=s[k]; });
    if(s.page) state.page=s.page;
  } catch(e){}
})();

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function scoreClass(s){ if(s==='—')return'nenhum'; const n=parseInt(s); if(n>=85)return'alto'; if(n>=60)return'medio'; return'baixo'; }

const _RATINGS=[{key:'otimo',pt:'Ótimo',type:'great'},{key:'bom',pt:'Bom',type:'good'},{key:'regular',pt:'Regular',type:'fair'},{key:'ruim',pt:'Ruim',type:'poor'}];
const _MOUTHS={great:'M11.5 23 Q20 33 28.5 23',good:'M12.5 24.5 Q20 29.5 27.5 24.5',fair:'M13 26 H27',poor:'M12.5 28.5 Q20 22.5 27.5 28.5'};
const _SEC1=[{key:'servicos_expectativa',pt:'A expectativa do tratamento'},{key:'servicos_explicacao',pt:'Explicação sobre benefícios e procedimentos'},{key:'servicos_atitude',pt:'Atitude e qualidade dos serviços'},{key:'servicos_tecnica',pt:'Técnica e habilidade da massoterapeuta'}];
const _SEC2=[{key:'instalacoes_conforto',pt:'Conforto e conservação do SPA'},{key:'instalacoes_organizacao',pt:'Organização e atmosfera do ambiente'},{key:'instalacoes_conveniencia',pt:'Itens de conveniência (roupões, toalhas)'}];
function _smly(type,filled,size,color){color=color||'#9A9A9A';const stroke=filled?'#fff':color,fill=filled?'var(--gold)':'none';return `<svg viewBox="0 0 40 40" width="${size}" height="${size}" fill="none"><circle cx="20" cy="20" r="17" fill="${fill}" stroke="${stroke}" stroke-width="2"/><circle cx="14.6" cy="16.4" r="1.7" fill="${stroke}"/><circle cx="25.4" cy="16.4" r="1.7" fill="${stroke}"/><path d="${_MOUTHS[type]}" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/></svg>`;}

let _detOverlay=null, _detEscHandler=null;
function detClose(){
  if(!_detOverlay)return;
  _detOverlay.style.display='none';
  document.body.style.overflow='';
  if(_detEscHandler){document.removeEventListener('keydown',_detEscHandler);_detEscHandler=null;}
}
async function openDetail(id){
  if(!_detOverlay){
    _detOverlay=document.createElement('div');
    _detOverlay.style.cssText='position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);overflow-y:auto;padding:40px 16px 80px';
    _detOverlay.setAttribute('tabindex','-1');
    document.body.appendChild(_detOverlay);
  }
  if(_detEscHandler)document.removeEventListener('keydown',_detEscHandler);
  _detEscHandler=e=>{if(e.key==='Escape')detClose();};
  document.addEventListener('keydown',_detEscHandler);
  _detOverlay.style.display='block';
  _detOverlay.scrollTop=0;
  document.body.style.overflow='hidden';
  _detOverlay.focus();
  const closeBtn=`<button id="detCloseBtn" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;flex:none">✕</button>`;
  _detOverlay.innerHTML=`<div style="background:var(--surface);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:100%;max-width:800px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35)"><div style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border-soft)">${closeBtn}</div><div class="empty" style="padding:60px 24px">Carregando...</div></div>`;
  _detOverlay.querySelector('#detCloseBtn')?.addEventListener('click',detClose);
  try{
    const r=await fetch(`/api/resposta/${id}`);
    const data=await r.json();
    if(!data.ok)throw new Error(data.error||'Erro');
    const it=data.item;
    const dtFmt=s=>s?s.slice(0,10).split('-').reverse().join('/'):'—';
    const tipoLabel={lazer:'Lazer',negocios:'Negócios',evento:'Evento',passante:'Passante',hospede:'Hóspede'};
    const scaleBar=`<div style="background:var(--gold);display:flex;align-items:center;gap:16px;padding:9px 0;margin-bottom:0;border-radius:8px 8px 0 0"><div style="flex:1"></div><div style="display:flex;gap:6px;padding-right:2px">${_RATINGS.map(rt=>`<div style="width:38px;display:flex;flex-direction:column;align-items:center;gap:3px">${_smly(rt.type,false,26,'#fff')}<span style="color:#fff;font-size:9px;font-weight:600;letter-spacing:.04em">${rt.pt}</span></div>`).join('')}</div></div>`;
    const rRow=(qpt,val)=>`<div style="display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-soft)"><span style="font-size:.88rem;color:var(--text);line-height:1.45;flex:1">${esc(qpt)}</span><div style="display:flex;gap:6px;padding-right:2px">${_RATINGS.map(rt=>`<div style="width:38px;display:flex;justify-content:center">${_smly(rt.type,rt.key===val,36)}</div>`).join('')}</div></div>`;
    const rSec=(num,label,qs,comment)=>`<div style="margin-bottom:60px"><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.1em">${num}</span><span style="font-weight:500;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)">${label}</span></div>${scaleBar}${qs.map(q=>rRow(q.pt,it[q.key])).join('')}${comment?`<div style="padding:10px 0 2px;font-style:italic;color:var(--muted2);font-size:.87rem;border-top:1px solid var(--border-soft);margin-top:2px">"${esc(comment)}"</div>`:''}</div>`;
    const rRadio=(sel,label,sub)=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:7px 0"><div style="width:18px;height:18px;border-radius:50%;border:1.5px solid ${sel?'var(--gold)':'var(--border)'};position:relative;flex:none;margin-top:2px">${sel?`<div style="position:absolute;inset:3px;border-radius:50%;background:var(--gold)"></div>`:''}</div><div><span style="font-size:.93rem;color:var(--text)">${esc(label)}</span>${sub?`<span style="color:var(--muted2);font-size:.88rem"> — ${esc(sub)}</span>`:''}</div></div>`;
    const bars=[1,2,3,4].map(()=>`<div style="flex:1;height:2px;background:var(--gold);border-radius:2px"></div>`).join('');
    _detOverlay.innerHTML=`<div style="background:var(--surface);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:100%;max-width:800px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35)">
      <div style="position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border-soft);padding:12px 24px 10px;display:flex;align-items:center;justify-content:space-between">
        <div class="eyebrow">Avaliação #${id}</div>${closeBtn}
      </div>
      <div style="display:flex;gap:6px;padding:0 24px">${bars}</div>
      <div style="max-width:720px;margin:0 auto;padding:40px 32px 80px">
        <div style="margin-bottom:52px">
          <div style="font-weight:500;font-size:1.3rem;color:var(--text);margin-bottom:5px">${esc(it.nome||'Sem nome')}</div>
          <div style="font-size:.82rem;color:var(--muted2)">${esc(it.email||'—')} · ${esc(tipoLabel[it.tipo_cliente]||it.tipo_cliente||'—')} · ${esc(dtFmt(it.submitted_at))}</div>
          ${it.nome_massoterapeuta?`<div style="font-size:.8rem;color:var(--muted);margin-top:10px">Massoterapeuta: <strong style="color:var(--text)">${esc(it.nome_massoterapeuta)}</strong>${it.tratamento_realizado?` &nbsp;·&nbsp; Tratamento: <strong style="color:var(--text)">${esc(it.tratamento_realizado)}</strong>`:''}</div>`:''}
          ${it.controle_interno?`<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Controle interno: <strong style="color:var(--text)">${esc(it.controle_interno)}</strong></div>`:''}
          ${it.inserido_por?`<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Inserido por: <strong style="color:var(--text)">${esc(it.inserido_por)}</strong> em ${it.submitted_at?dtFmt(it.submitted_at)+' '+it.submitted_at.slice(11,16):'—'}</div>`:''}
        </div>
        ${rSec('01','SERVIÇOS',_SEC1,it.servicos_comentario)}
        ${rSec('02','INSTALAÇÕES',_SEC2,it.instalacoes_comentario)}
        <div style="margin-bottom:60px">
          <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.1em">03</span><span style="font-weight:500;font-size:14px;letter-spacing:.13em;text-transform:uppercase;color:var(--text)">VOCÊ RECOMENDARIA ALGUM TRATAMENTO EM PARTICULAR?</span></div>
          ${rRadio(it.recomenda==='sim','Sim',it.recomenda_qual||null)}
          ${rRadio(it.recomenda==='nao','Não',it.recomenda_porque||null)}
        </div>
        <div style="margin-bottom:32px">

function buildSegs(dist){
  const {otimo=0,bom=0,regular=0,ruim=0}=dist, tot=otimo+bom+regular+ruim||1, segs=[];
  if(otimo)segs.push({w:otimo/tot*100,bg:'var(--success)',tip:`Ótimo: ${otimo}`});
  if(bom)segs.push({w:bom/tot*100,bg:'var(--gold)',tip:`Bom: ${bom}`});
  if(regular)segs.push({w:regular/tot*100,bg:'var(--warn-dim)',bdr:'1px solid var(--gold)',tip:`Regular: ${regular}`});
  if(ruim)segs.push({w:ruim/tot*100,bg:'var(--danger)',tip:`À Melhorar: ${ruim}`});
  if(!segs.length)segs.push({w:100,bg:'var(--border-soft)',tip:'Sem dados'});
  return segs;
}

            <div class="ov-stat"><div class="ov-stat-val">${mesMap.eventos||0}</div><div class="ov-stat-label">Eventos este mês</div></div>
            <div class="ov-stat"><div class="ov-stat-val">${spaMes}</div><div class="ov-stat-label">Gran SPA este mês</div></div>
          </div>
        </div>
        <div class="ov-hero" style="background:linear-gradient(140deg,var(--surface) 0%,var(--success-dim) 100%);border-color:rgba(21,112,90,.2)">

async function renderLocal(trigger){
  if(_renderCtrl)_renderCtrl.abort();
  _renderCtrl=new AbortController();
  const {signal}=_renderCtrl;
  const isAuto=!trigger;
  const savedScrollY=window.scrollY;
  const main=document.getElementById('main');
  main.style.opacity='0.5';main.style.pointerEvents='none';
  try{
    const qs=new URLSearchParams({tipo:activeTab,from:state.from||'',to:state.to||'',q:state.q||'',page:state.page,limit:LIMIT});
    const res=await fetch('/api/respostas-local?'+qs,{signal});
    if(res.status===401){location.href='/acesso-hub.html';return;}
    const data=await res.json();
    if(!data.ok)throw new Error(data.error);
    state.totalPages=Math.ceil((data.total||0)/LIMIT)||1;
    const labels={geral:'Geral da Qualidade',pdvs:'PDVs',eventos:'Eventos'};
    main.innerHTML=`<div class="kpis-hdr"><div class="eyebrow">${labels[activeTab]||activeTab}</div></div>
      <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);max-width:560px;margin-bottom:52px">
        <div class="kpi hero"><div class="kpi-label">Total de avaliações</div><div><div class="kpi-hero-val">${data.total}<span></span></div><div class="kpi-hero-line"></div></div></div>
        <div class="kpi"><div class="kpi-label">Nesta página</div><div class="kpi-val">${data.items.length}<span>/${LIMIT}</span></div></div>
        <div class="kpi"><div class="kpi-label">Páginas</div><div class="kpi-val">${state.totalPages}</div></div>
      </div>`+renderLocalFilters()+renderLocalTable(data.items||[],data.total||0,state.page);
    main.style.opacity='';main.style.pointerEvents='';
    if(isAuto)window.scrollTo({top:savedScrollY,behavior:'instant'});
    else if(trigger==='filter'||trigger==='page')document.querySelector('.tbl-hdr')?.scrollIntoView({behavior:'smooth',block:'start'});
    document.getElementById('btnF')?.addEventListener('click',()=>{
      state.from=state.to=document.getElementById('fDate')?.value||'';
      state.periodCustom=!!state.from;
      state.q=document.getElementById('fQ')?.value||'';
      state.page=1;render('filter');
    });
    document.getElementById('fQ')?.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      state.from=state.to=document.getElementById('fDate')?.value||'';
      state.periodCustom=!!state.from;
      state.q=document.getElementById('fQ').value||'';
      state.page=1;render('filter');
    });
    document.getElementById('pgPrev')?.addEventListener('click',()=>{if(state.page>1){state.page--;render('page');}});
    document.getElementById('pgNext')?.addEventListener('click',()=>{if(state.page<state.totalPages){state.page++;render('page');}});
  }catch(e){
    if(e.name==='AbortError')return;
    main.style.opacity='';main.style.pointerEvents='';
    main.innerHTML=`<div class="empty">Erro: ${esc(e.message)}</div>`;
  }
}

  main.style.opacity='0.5';
  main.style.pointerEvents='none';
  try {
    const qs=new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem});
    const qr=new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem,q:state.q,page:state.page,limit:LIMIT});
    const [sRes,rRes]=await Promise.all([fetch('/api/stats?'+qs,{signal}),fetch('/api/respostas?'+qr,{signal})]);
    if(sRes.status===401||rRes.status===401){location.href='/acesso-hub.html';return;}
    const [s,r]=await Promise.all([sRes.json(),rRes.json()]);
    if(!s.ok)throw new Error(s.error);
    const secoes=s.secoes||[];
    const secsHtml=secoes.map((sec,i)=>renderSection(sec,i)).join('');
    const comHtml=renderComments(s.comentarios||[],secoes.length);
    state.totalPages=Math.ceil((r.total||0)/LIMIT)||1;
    main.innerHTML=renderKpis(s)+secsHtml+comHtml+renderFilters()+renderTable(r.items||[],r.total||0,state.page);
    main.style.opacity='';
    main.style.pointerEvents='';
    if(isAuto){
      window.scrollTo({top:savedScrollY,behavior:'instant'});
    } else if(trigger==='filter'||trigger==='chip'||trigger==='page'){
      document.querySelector('.tbl-hdr')?.scrollIntoView({behavior:'smooth',block:'start'});
    }
    document.getElementById('btnF')?.addEventListener('click',()=>{
      const d=document.getElementById('fDate')?.value||'';
      state.from=state.to=d;
      state.periodCustom=!!d;
      state.tipo=document.getElementById('fTipo')?.value||'';
      state.origem=document.getElementById('fOrigem')?.value||'';
      state.q=document.getElementById('fQ')?.value||'';
      state.page=1;
      render('filter');
    });
    document.getElementById('fQ')?.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      const d=document.getElementById('fDate')?.value||'';
      state.from=state.to=d;
      state.periodCustom=!!d;
      state.tipo=document.getElementById('fTipo')?.value||'';
      state.origem=document.getElementById('fOrigem')?.value||'';
      state.q=document.getElementById('fQ').value||'';
      state.page=1;
      render('filter');
    });
    document.querySelectorAll('.chip-x').forEach(x=>x.addEventListener('click',()=>{
      const k=x.dataset.key;
      if(k==='period'){
        state.from=state.to='';
        state.periodCustom=false;
      } else if(k in state)state[k]='';
      state.page=1;
      render('chip');
    }));
    document.getElementById('pgPrev')?.addEventListener('click',()=>{if(state.page>1){state.page--;render('page');}});
    document.getElementById('pgNext')?.addEventListener('click',()=>{if(state.page<state.totalPages){state.page++;render('page');}});
    document.querySelectorAll('.tbl-row').forEach(row=>row.addEventListener('click',()=>{
      const id=parseInt(row.dataset.id);
      if(id)openDetail(id);
    }));
  } catch(e) {
    if(e.name==='AbortError')return;
    main.style.opacity='';
    main.style.pointerEvents='';
    const errDiv=document.createElement('div');
    errDiv.className='empty';
    errDiv.innerHTML=`Erro ao carregar: ${esc(e.message)}<br><br>`;
    const retryBtn=document.createElement('button');
    retryBtn.className='btn-gold';
    retryBtn.textContent='Tentar novamente';
    retryBtn.addEventListener('click',()=>render('retry'));
    errDiv.appendChild(retryBtn);
    main.innerHTML='';
    main.appendChild(errDiv);
  }
}

  function psBindCombo(inputId,listId,items,startOnly){
    const inp=document.getElementById(inputId);
    const lst=document.getElementById(listId);
    if(!inp||!lst||!items.length)return;
    function showList(filter){
      const q=(filter||'').toLowerCase().trim();
      const matches=q?items.filter(n=>startOnly?n.toLowerCase().startsWith(q):n.toLowerCase().includes(q)):items;
      if(!matches.length){lst.innerHTML=`<div class="ps-dropdown-empty">Nenhum resultado</div>`;lst.style.display='block';return;}
      lst.innerHTML=matches.map(n=>`<div class="ps-dropdown-item">${esc(n)}</div>`).join('');
      lst.style.display='block';
      lst.querySelectorAll('.ps-dropdown-item').forEach(el=>el.addEventListener('mousedown',e=>{
        e.preventDefault();
        inp.value=el.textContent;
        lst.style.display='none';
        const errEl=document.getElementById(inputId+'Err');
        if(errEl)errEl.style.display='none';
      }));
    }
    inp.addEventListener('focus',()=>{ if(!startOnly||inp.value.trim())showList(inp.value); });
    inp.addEventListener('input',()=>showList(inp.value));
    inp.addEventListener('blur',()=>setTimeout(()=>{lst.style.display='none';},150));
  }

  const _EMAIL_RE=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  function psValidateTel(){
    const val=(document.getElementById('psTel')?.value||'').trim();
    const errEl=document.getElementById('psTelErr');
    if(!val){ if(errEl)errEl.style.display='none'; return true; }
    let ok;
    if(val.startsWith('+')){
      const d=val.slice(1).replace(/\D/g,'');
      ok=d.length>=8&&d.length<=15;
    } else {
      const d=val.replace(/\D/g,'');
      ok=d.length===10||d.length===11;
    }
    if(errEl)errEl.style.display=ok?'none':'block';
    return ok;
  }
  function psValidateEmail(){
    const val=(document.getElementById('psEmail')?.value||'').trim();
    const errEl=document.getElementById('psEmailErr');
    if(!val){ if(errEl)errEl.style.display='none'; return true; }
    const ok=_EMAIL_RE.test(val);

  async function psSubmit(){

    btn.disabled=true; msgEl.style.display='none';
    try {
      const payload={
        nome,email,
        apto:(document.getElementById('psApto')?.value||'').trim()||null,
        controle_interno:(document.getElementById('psControleInterno')?.value||'').trim()||null,
        telefone:(document.getElementById('psTel')?.value||'').trim()||null,
        data_tratamento:(document.getElementById('psData')?.value||'').trim()||null,
        tratamento_realizado:(document.getElementById('psTratamento')?.value||'').trim()||null,
        nome_massoterapeuta:(document.getElementById('psMasso')?.value||'').trim()||null,
        ...psRatings,
        servicos_comentario:(document.getElementById('psComSec1')?.value||'').trim()||null,
