<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestão da Qualidade — Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
[data-theme="light"]{
  --bg:#ECE4D2;--surface:#FAF9F5;--surface2:#ECE4D2;
  --header-bg:rgba(236,228,210,0.88);
  --grad1:rgba(156,88,67,.06);--grad2:rgba(156,88,67,.03);
  --border:rgba(122,107,90,.22);--border-soft:rgba(122,107,90,.10);
  --text:#202C28;--muted:#7A6B5A;--muted2:#996442;
  --gold:#9C5843;--gold-dark:#7E4636;--gold-dim:rgba(156,88,67,.12);--gold-dim2:rgba(156,88,67,.06);
  --success:#15705A;--success-dim:rgba(21,112,90,.12);
  --warn:#996442;--warn-dim:rgba(153,100,66,.12);
  --danger:#B85450;--danger-dim:rgba(184,84,80,.10);
}
[data-theme="dark"]{
  --bg:#202C28;--surface:#2E3C38;--surface2:#1A2421;
  --header-bg:rgba(32,44,40,0.88);
  --grad1:rgba(156,88,67,.10);--grad2:rgba(156,88,67,.05);
  --border:rgba(236,228,210,.22);--border-soft:rgba(236,228,210,.10);
  --text:#ECE4D2;--muted:#8A7B6A;--muted2:#C8B89A;
  --gold:#9C5843;--gold-dark:#B26A54;--gold-dim:rgba(156,88,67,.18);--gold-dim2:rgba(156,88,67,.08);
  --success:#25D366;--success-dim:rgba(37,211,102,.16);
  --warn:#996442;--warn-dim:rgba(153,100,66,.18);
  --danger:#D86862;--danger-dim:rgba(216,104,98,.18);
}
html,body{height:100%;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1100px 560px at 12% -4%,var(--grad1),transparent 62%),radial-gradient(900px 520px at 88% 14%,var(--grad2),transparent 60%),var(--bg);color:var(--text);min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hdr-brand{position:relative;padding-bottom:6px;display:flex;align-items:center;text-decoration:none}
.hdr-brand::after{content:'';position:absolute;left:0;bottom:0;width:40px;height:2px;background:var(--gold)}
.hdr-brand img{height:30px;width:auto}
[data-theme="dark"] .hdr-brand img{filter:brightness(0) invert(1)}
.hdr-brand em{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-weight:300;font-size:.92rem;color:var(--muted2);margin-left:2px}
.hdr-right{display:flex;align-items:center;gap:18px}
.hdr-ts{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted)}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--muted2);font-size:.82rem;transition:all .2s}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.btn-sair{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.78rem;font-weight:500;color:var(--muted2);background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;transition:all .2s}
.btn-sair:hover{border-color:var(--gold);color:var(--gold-dark)}
.tabs{display:flex;gap:30px;padding:0 40px;border-bottom:1px solid var(--border-soft);background:var(--header-bg)}
.tab{padding:15px 2px 13px;font-size:.86rem;font-weight:600;color:var(--gold-dark);border-bottom:2px solid var(--gold);margin-bottom:-1px;cursor:pointer}
.main{max-width:1220px;margin:0 auto;padding:44px 40px 80px}
.eyebrow{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr 1.2fr;gap:16px;margin-bottom:72px}
.kpi{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;gap:14px}
.kpi.hero{border-radius:14px;border-color:var(--border);padding:26px 28px 22px;box-shadow:0 4px 18px var(--gold-dim)}
.kpi.warn{background:linear-gradient(180deg,var(--gold-dim),transparent 70%),var(--surface);border-color:var(--gold)}
.kpi-label{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.kpi-warn-label{display:flex;align-items:center;gap:8px}
.kpi-warn-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);flex-shrink:0}
.kpi-warn-label .kpi-label{color:var(--gold-dark)}
.kpi-hero-val{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:3.6rem;line-height:1;color:var(--text);margin-top:14px}
.kpi-hero-val span{font-size:1.9rem;color:var(--gold)}
.kpi-hero-line{width:40px;height:3px;background:var(--gold);margin-top:10px}
.kpi-hero-sub{font-size:.74rem;color:var(--muted2);margin-top:10px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:1.9rem;line-height:1;color:var(--text)}
.kpi-val span{font-size:1.2rem;color:var(--muted)}
.kpi-warn-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:1.9rem;line-height:1;color:var(--gold-dark)}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:6px}
.kpi-warn-sub{font-size:.68rem;color:var(--muted2);margin-top:6px}
.sec-hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:6px}
.sec-hdr-left{display:flex;align-items:baseline;gap:18px}
.sec-num{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:300;font-size:3.4rem;line-height:.9;color:var(--gold);opacity:.55}
.sec-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.7rem;color:var(--text);line-height:1.15}
.sec-legend{display:flex;gap:18px;padding-bottom:6px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted)}
.legend-swatch{width:14px;height:8px;border-radius:2px;flex-shrink:0}
.sec-divider{height:1px;background:var(--border-soft);margin-bottom:26px}
.q-list{display:flex;flex-direction:column;margin-bottom:72px}
.q-row{display:grid;grid-template-columns:380px 1fr 130px;align-items:center;gap:32px;padding:18px 14px;border-radius:10px;border-bottom:1px solid var(--border-soft);transition:background .2s}
.q-row:hover{background:var(--surface)}
.q-text{font-size:.92rem;color:var(--text);line-height:1.4}
.q-bar{display:flex;gap:3px;height:12px}
.q-seg{border-radius:3px}
.q-nota{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.4rem;color:var(--text);text-align:right}
.q-resp{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);margin-top:2px;text-align:right}
.comment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:72px}
.comment-col-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.comment-cards{display:flex;flex-direction:column;gap:14px}
.comment-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:18px 20px 16px;transition:all .25s}
.comment-card:hover{border-color:var(--border);box-shadow:0 4px 18px var(--gold-dim);transform:translateY(-1px)}
.comment-qm{font-family:'Helvetica Neue',Arial,sans-serif;font-size:1.9rem;line-height:1;color:var(--gold);opacity:.8;margin-bottom:2px}
.comment-text{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-size:1.05rem;color:var(--text);line-height:1.45;margin-bottom:12px}
.comment-meta{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.comment-meta .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none}
.filter-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.filter-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;box-shadow:0 4px 18px var(--gold-dim)}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group .fl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.fi{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 14px}
.fi input,.fi select{background:none;border:none;outline:none;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;color:var(--text);cursor:pointer}
.fi select option{background:var(--surface);color:var(--text)}
.filter-flex{flex:1;min-width:200px}
.btn-gold{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:9px;padding:11px 26px;cursor:pointer;transition:background .2s;box-shadow:0 4px 18px var(--gold-dim);align-self:flex-end}
.btn-gold:hover{background:var(--gold-dark)}
.chips{display:flex;gap:8px;margin-bottom:44px;flex-wrap:wrap;min-height:24px}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:.72rem;color:var(--gold-dark);font-weight:500}
.chip-x{cursor:pointer;opacity:.7;transition:opacity .2s}
.chip-x:hover{opacity:1}
.kpis-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.tbl-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.tbl-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.35rem;color:var(--text)}
.tbl-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 18px var(--gold-dim)}
.tbl-head{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl-head div{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border-soft);transition:background .2s}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--gold-dim2)}
.tbl-date{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted2)}
.tbl-nome{font-size:.86rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-email{font-size:.8rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-tipo span{display:inline-block;font-size:.68rem;font-weight:500;color:var(--muted2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;background:var(--surface)}
.tbl-orig{font-size:.8rem;color:var(--muted2)}
.score{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;border-radius:999px;padding:3px 12px;min-width:34px;text-align:center;border:1px solid transparent}
.score.alto{color:var(--success);background:var(--success-dim)}
.score.medio{color:var(--gold-dark);background:var(--gold-dim)}
.score.baixo{color:var(--danger);background:var(--danger-dim)}
.score.nenhum{color:var(--muted);background:transparent;border-color:var(--border)}
.tbl-ver span{font-size:.78rem;font-weight:600;color:var(--gold-dark);cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.tbl-ver span:hover{border-bottom-color:var(--gold)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
@media(max-width:900px){
  .hdr{padding:0 16px}
  .tabs{padding:0 16px;gap:20px}
  .main{padding:24px 16px 60px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .q-row{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:10px 12px}
  .q-bar{grid-column:1/-1}
  .comment-grid{grid-template-columns:1fr}
  .tbl-head,.tbl-row{grid-template-columns:90px 1fr 60px 46px}
  .tbl-email,.tbl-tipo,.tbl-orig{display:none}
  .sec-legend{flex-wrap:wrap;gap:10px}
  .q-list{margin-bottom:48px}
}
.btn-nova-pesquisa{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.78rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:8px;padding:7px 16px;cursor:pointer;transition:background .2s;letter-spacing:.04em}
.btn-nova-pesquisa:hover{background:var(--gold-dark)}
#psOverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
#psModal{background:var(--bg);width:100%;max-width:820px;margin:auto;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.3);position:relative}
.ps-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;background:rgba(122,107,90,.18);cursor:pointer;color:var(--muted);font-size:1.1rem;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s;z-index:2}
.ps-close:hover{background:var(--gold-dim);color:var(--gold)}
.ps-progress{height:4px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:3px}
.ps-prog-seg{background:rgba(156,88,67,.2);transition:background .3s}
.ps-prog-seg.done{background:#9C5843}
.ps-inner{padding:40px 48px 48px;background:#ECE4D2;color:#1A1A1A}
[data-theme="dark"] #psModal .ps-inner{background:#202C28;color:#ECE4D2}
.ps-title{font-size:1.5rem;font-weight:500;text-align:center;margin-bottom:10px;color:inherit}
.ps-intro{font-size:.85rem;line-height:1.6;text-align:center;margin-bottom:6px;color:inherit}
.ps-intro-en{font-size:.82rem;color:#6B6B6B;font-style:italic;line-height:1.6;text-align:center;margin-bottom:32px}
.ps-id-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 32px;margin-bottom:36px}
.ps-field{padding-bottom:14px;margin-bottom:4px;border-bottom:1px solid rgba(156,88,67,.18)}
.ps-field label{display:block;font-size:.74rem;font-weight:600;margin-bottom:4px;color:inherit}
.ps-field label em{font-style:italic;color:#6B6B6B;font-weight:400;margin-left:4px;font-size:.72rem}
.ps-field input{width:100%;background:none;border:none;outline:none;font-size:.86rem;color:inherit;font-family:'Helvetica Neue',Arial,sans-serif;padding:2px 0}
.ps-sec{margin-bottom:32px}
.ps-sec-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:14px}
.ps-sec-num{font-family:'JetBrains Mono',monospace;font-size:1.3rem;color:#9C5843;letter-spacing:.05em}
.ps-sec-title{font-size:.78rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:inherit}
.ps-sec-en{font-size:.78rem;font-style:italic;color:#6B6B6B;margin-left:6px}
.ps-rating-hdr{display:grid;grid-template-columns:1fr 88px 88px 88px 88px;background:#9C5843;color:#fff;padding:10px 12px;border-radius:8px 8px 0 0;font-size:.72rem;gap:4px}
.ps-rating-left{font-style:italic;display:flex;align-items:center;font-size:.78rem}
.ps-rating-col{display:flex;flex-direction:column;align-items:center;gap:2px;text-align:center;line-height:1.3}
.ps-q-row{display:grid;grid-template-columns:1fr 88px 88px 88px 88px;gap:4px;align-items:center;padding:10px 12px;border-bottom:1px solid rgba(156,88,67,.12);background:var(--surface)}
.ps-q-text{font-size:.82rem;line-height:1.4;color:inherit}
.ps-q-text em{display:block;font-style:italic;color:#6B6B6B;font-size:.76rem;margin-top:2px}
.ps-face-wrap{display:flex;justify-content:center}
.ps-face-btn{width:48px;height:48px;border:2px solid rgba(156,88,67,.22);border-radius:50%;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#7A6B5A;transition:all .18s}
.ps-face-btn:hover{border-color:#9C5843;color:#9C5843}
.ps-face-btn.sel{border-color:#9C5843;background:#9C5843;color:#fff}
.ps-sec-comment{background:var(--surface);padding:10px 12px;border-radius:0 0 8px 8px;border-top:1px solid rgba(156,88,67,.12)}
.ps-sec-comment input{width:100%;background:none;border:none;border-bottom:1px solid rgba(156,88,67,.3);outline:none;font-size:.82rem;color:inherit;font-family:'Helvetica Neue',Arial,sans-serif;padding:6px 0}
.ps-radio-group{display:flex;flex-direction:column;gap:14px}
.ps-radio-item{cursor:pointer}
.ps-radio-row{display:flex;align-items:center;gap:12px}
.ps-radio-dot{width:20px;height:20px;border:2px solid rgba(156,88,67,.35);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s}
.ps-radio-dot.sel{border-color:#9C5843;background:#9C5843}
.ps-radio-dot.sel::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff}
.ps-radio-label{font-size:.84rem;color:inherit}
.ps-radio-label em{color:#6B6B6B;font-style:italic;font-size:.78rem;margin-left:4px}
.ps-radio-reveal{overflow:hidden;max-height:0;transition:max-height .25s ease}
.ps-radio-reveal.open{max-height:80px}
.ps-radio-reveal input{width:100%;margin-top:8px;background:none;border:none;border-bottom:1px solid rgba(156,88,67,.3);outline:none;font-size:.82rem;color:inherit;font-family:'Helvetica Neue',Arial,sans-serif;padding:6px 0;display:block}
.ps-tipo-grid{display:flex;gap:12px;flex-wrap:wrap}
.ps-tipo-btn{padding:9px 22px;border:1.5px solid rgba(156,88,67,.28);border-radius:999px;background:none;cursor:pointer;font-size:.82rem;color:#7A6B5A;font-family:'Helvetica Neue',Arial,sans-serif;transition:all .18s}
.ps-tipo-btn:hover{border-color:#9C5843;color:#9C5843}
.ps-tipo-btn.sel{border-color:#9C5843;background:rgba(156,88,67,.12);color:#7E4636;font-weight:600}
.ps-footer{text-align:center;margin-top:28px;padding-top:24px;border-top:1px solid rgba(156,88,67,.18)}
.ps-footer p{font-style:italic;color:#6B6B6B;font-size:.82rem;line-height:1.7}
.ps-team{color:#9C5843;font-weight:500;font-size:.84rem;font-style:normal}
.ps-address{font-size:.7rem;color:#6B6B6B;margin-top:14px;text-align:center}
.ps-submit-wrap{text-align:center;margin-top:24px}
.ps-submit{background:#9C5843;color:#fff;border:none;padding:15px 44px;font-size:.82rem;font-weight:600;letter-spacing:.17em;text-transform:uppercase;cursor:pointer;font-family:'Helvetica Neue',Arial,sans-serif;transition:background .2s}
.ps-submit:hover:not(:disabled){background:#7E4636}
.ps-submit:disabled{opacity:.6;cursor:not-allowed}
.ps-msg{text-align:center;padding:10px 16px;font-size:.82rem;margin-top:10px;border-radius:8px;display:none}
.ps-msg.ok{background:rgba(21,112,90,.12);color:#15705A}
.ps-msg.err{background:rgba(184,84,80,.1);color:#B85450}
@media(max-width:680px){
  #psOverlay{padding:0}
  #psModal{border-radius:0;min-height:100svh}
  .ps-inner{padding:24px 18px 40px}
  .ps-id-grid{grid-template-columns:1fr}
  .ps-rating-hdr,.ps-q-row{grid-template-columns:1fr 66px 66px 66px 66px}
  .ps-face-btn{width:40px;height:40px}
}
@media(max-width:480px){
  .hdr{padding:0 14px;height:54px}
  .hdr-brand em{display:none}
  .hdr-ts{display:none}
  .hdr-right{gap:10px}
  .btn-sair{padding:6px 10px;font-size:.72rem}
  .tabs{padding:0 14px;gap:16px}
  .tab{font-size:.78rem;padding:12px 2px 10px}
  .main{padding:18px 14px 56px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:44px}
  .kpi.hero{grid-column:1/-1}
  .kpi-hero-val{font-size:2.6rem}
  .kpi{padding:16px 16px}
  .sec-num{font-size:2.2rem}
  .sec-title{font-size:1.25rem}
  .sec-legend{display:none}
  .q-row{padding:12px 10px;gap:8px 10px}
  .q-text{font-size:.84rem}
  .q-nota{font-size:1.15rem}
  .q-list{margin-bottom:40px}
  .comment-grid{margin-bottom:44px}
  .filter-box{padding:14px 12px;gap:10px}
  .filter-group{width:100%}
  .fi{width:100%}
  .btn-gold{width:100%;text-align:center}
  .chips{margin-bottom:28px}
  .tbl-head,.tbl-row{grid-template-columns:78px 1fr 54px}

<body data-theme="light">

<header class="hdr">
  <div style="display:flex;align-items:center">
    <a class="hdr-brand" href="https://hub-granmarquise.fly.dev" target="_blank" rel="noopener">
      <img src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
      <em> · Gestão da Qualidade</em>
    </a>
  </div>
  <div class="hdr-right">
    <span class="hdr-ts" id="ts"></span>
    <button class="btn-nova-pesquisa" id="btnNovaPesquisa">+ Nova Pesquisa</button>
    <button class="btn-icon" id="btnTheme" title="Alternar tema">☾</button>
    <button class="btn-sair" onclick="location.href='/api/logout'">Sair</button>
  </div>
</header>

<div class="tabs"><div class="tab">Avaliações</div></div>

<main class="main" id="main"><div class="empty">Carregando...</div></main>

<script>
(function(){
'use strict';
const body = document.body;
const saved = localStorage.getItem('gq_theme') || 'light';
body.setAttribute('data-theme', saved);
const btn = document.getElementById('btnTheme');
btn.textContent = saved === 'dark' ? '☀' : '☾';
btn.onclick = () => {
  const t = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', t);
  localStorage.setItem('gq_theme', t);
  btn.textContent = t === 'dark' ? '☀' : '☾';
};

function updateTs() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('ts').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} · ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
updateTs(); setInterval(updateTs, 60000);

const state = { from:'', to:'', tipo:'', origem:'', q:'' };
(function(){
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  state.to = fmt(now);
  state.from = fmt(new Date(now.getTime() - 30*24*3600*1000));
})();

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function scoreClass(s){ if(s==='—')return'nenhum'; const n=parseInt(s); if(n>=85)return'alto'; if(n>=60)return'medio'; return'baixo'; }

function buildSegs(dist){
  const {otimo=0,bom=0,regular=0,ruim=0}=dist, tot=otimo+bom+regular+ruim||1, segs=[];
  if(otimo)segs.push({w:otimo/tot*100,bg:'var(--success)',tip:`Ótimo: ${otimo}`});
  if(bom)segs.push({w:bom/tot*100,bg:'var(--gold)',tip:`Bom: ${bom}`});
  if(regular)segs.push({w:regular/tot*100,bg:'var(--warn-dim)',bdr:'1px solid var(--gold)',tip:`Regular: ${regular}`});
  if(ruim)segs.push({w:ruim/tot*100,bg:'var(--danger)',tip:`À Melhorar: ${ruim}`});
  if(!segs.length)segs.push({w:100,bg:'var(--border-soft)',tip:'Sem dados'});
  return segs;
}

function legend(){
  return `<div class="sec-legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--success)"></span>Ótimo</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--gold)"></span>Bom</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--warn-dim);border:1px solid var(--gold)"></span>Regular</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--danger)"></span>À Melhorar</div>
  </div>`;
}

function renderSection(sec, i){
  const num = String(i+1).padStart(2,'0');
  const qs = sec.perguntas.map(q => {
    const segs = buildSegs(q.distribuicao);
    return `<div class="q-row">
      <div class="q-text">${esc(q.texto)}</div>
      <div class="q-bar">${segs.map(s=>`<div class="q-seg" style="flex:${s.w} 1 0%;background:${s.bg};${s.bdr?'border:'+s.bdr:''}" title="${esc(s.tip)}"></div>`).join('')}</div>
      <div><div class="q-nota">${esc(q.nota)}</div><div class="q-resp">${q.respostas} resp.</div></div>
    </div>`;
  }).join('');
  return `<div class="sec-hdr">
    <div class="sec-hdr-left">
      <div class="sec-num">${num}</div>
      <div><div class="eyebrow">Seção</div><div class="sec-title">${esc(sec.titulo)}</div></div>
    </div>
    ${i===0?legend():''}
  </div>
  <div class="sec-divider"></div>
  <div class="q-list">${qs||'<div class="empty">Sem respostas no período</div>'}</div>`;
}

function renderComments(coms){
  if(!coms.length)return'';
  const cols = coms.map(g=>`<div>
    <div class="comment-col-label">${esc(g.label)}</div>
    <div class="comment-cards">${g.itens.map(qt=>`<div class="comment-card">
      <div class="comment-qm">"</div>
      <div class="comment-text">${esc(qt.text)}</div>
      <div class="comment-meta">${esc(qt.author)} · <span class="mono">${esc(qt.date)}</span></div>
    </div>`).join('')}</div>
  </div>`).join('');
  const numSec = String(coms.length ? 3 : 3).padStart(2,'0');
  return `<div class="sec-hdr"><div class="sec-hdr-left">
    <div class="sec-num">${numSec}</div>
    <div><div class="eyebrow">Seção</div><div class="sec-title">Comentários &amp; Respostas</div></div>
  </div></div>
  <div class="sec-divider"></div>
  <div class="comment-grid">${cols}</div>`;
}

function renderFilters(){
  const chips = [];
  if(state.from&&state.to) chips.push({l:`Período: ${state.from.split('-').reverse().join('/')} → ${state.to.split('-').reverse().join('/')}`,k:'period'});
  if(state.tipo) chips.push({l:`Tipo: ${state.tipo}`,k:'tipo'});
  if(state.origem) chips.push({l:`Origem: ${state.origem}`,k:'origem'});
  if(state.q) chips.push({l:`Busca: ${state.q}`,k:'q'});
  return `<div class="filter-label">Filtros</div>
  <div class="filter-box">
    <div class="filter-group">
      <span class="fl">Período</span>
      <div class="fi"><input type="date" id="fFrom" value="${state.from}"><span style="color:var(--gold)">→</span><input type="date" id="fTo" value="${state.to}"></div>
    </div>
    <div class="filter-group">
      <span class="fl">Origem</span>
      <div class="fi"><select id="fOrigem">
        <option value="">Todas</option>
        <option value="hospede" ${state.origem==='hospede'?'selected':''}>Hóspede</option>
        <option value="colaborador" ${state.origem==='colaborador'?'selected':''}>Colaborador</option>
      </select></div>
    </div>
    <div class="filter-group">
      <span class="fl">Tipo</span>
      <div class="fi"><select id="fTipo">
        <option value="">Todos</option>
        <option value="lazer" ${state.tipo==='lazer'?'selected':''}>Lazer</option>
        <option value="negocios" ${state.tipo==='negocios'?'selected':''}>Negócios</option>
        <option value="evento" ${state.tipo==='evento'?'selected':''}>Evento</option>
        <option value="passante" ${state.tipo==='passante'?'selected':''}>Passante</option>
        <option value="hospede" ${state.tipo==='hospede'?'selected':''}>Hóspede</option>
      </select></div>
    </div>
    <div class="filter-group filter-flex">
      <span class="fl">Busca</span>
      <div class="fi">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input type="text" id="fQ" placeholder="Nome ou e-mail…" value="${esc(state.q)}" style="flex:1">
      </div>
    </div>
    <button class="btn-gold" id="btnF">Filtrar</button>
  </div>
  <div class="chips" id="chips">${chips.map(c=>`<div class="chip">${esc(c.l)}<span class="chip-x" data-key="${c.k}">✕</span></div>`).join('')}</div>`;
}

function renderTable(rows, total){
  const rHtml = rows.map(r=>`<div class="tbl-row">
    <div class="tbl-date">${esc(r.date)}</div>
    <div class="tbl-nome">${esc(r.nome)}</div>
    <div class="tbl-email">${esc(r.email)}</div>
    <div class="tbl-tipo"><span>${esc(r.tipo)}</span></div>
    <div class="tbl-orig">${r.origem==='colaborador'?'Colaborador':'Hóspede'}</div>
    <div><span class="score ${scoreClass(r.media)}">${esc(r.media)}</span></div>
    <div class="tbl-ver"><span>Ver</span></div>
  </div>`).join('');
  return `<div class="tbl-hdr"><div class="tbl-title">Avaliações</div><div class="tbl-count">${total} resultado${total!==1?'s':''}</div></div>
  <div class="tbl-wrap">
    <div class="tbl-head"><div>Data</div><div>Nome</div><div>E-mail</div><div>Tipo</div><div>Origem</div><div>Média</div><div></div></div>
    ${rHtml||'<div class="empty">Nenhuma avaliação encontrada</div>'}
  </div>`;
}

function renderKpis(s){
  const h=s.origemDistrib?.hospede||0, c=s.origemDistrib?.colaborador||0;
  return `<div class="kpis-hdr"><div class="eyebrow">Visão geral do período</div></div>
  <div class="kpi-grid">
    <div class="kpi hero">
      <div class="kpi-label">Média geral</div>
      <div>
        <div class="kpi-hero-val">${s.mediaGeral!=null?Math.floor(s.mediaGeral):'—'}<span>${s.mediaGeral!=null?'%':''}</span></div>
        <div class="kpi-hero-line"></div>
        <div class="kpi-hero-sub">média de ${s.total} avaliação${s.total!==1?'s':''}</div>
      </div>
    </div>
    <div class="kpi"><div class="kpi-label">Total no período</div><div class="kpi-val">${s.total}</div></div>
    <div class="kpi">
      <div class="kpi-label">Recomendação</div>
      <div class="kpi-val">${s.pctRecomendacao!=null?s.pctRecomendacao.toFixed(1).replace('.',','):'—'}<span>${s.pctRecomendacao!=null?'%':''}</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Origem</div>
      <div><div class="kpi-val">${h}<span>/${c}</span></div><div class="kpi-sub">hóspede / colaborador</div></div>
    </div>
    <div class="kpi warn">
      <div class="kpi-warn-label"><span class="kpi-warn-dot"></span><span class="kpi-label">Sem avaliação</span></div>
      <div><div class="kpi-warn-val">${s.semAvaliacao||0}</div><div class="kpi-warn-sub">sessões sem resposta</div></div>
    </div>
  </div>`;
}

async function render(){
  const main = document.getElementById('main');
  main.innerHTML = '<div class="empty">Carregando...</div>';
  try {
    const qs = new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem});
    const qr = new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem,q:state.q,page:1,limit:20});
    const [sRes,rRes] = await Promise.all([fetch('/api/stats?'+qs),fetch('/api/respostas?'+qr)]);
    if(sRes.status===401||rRes.status===401){ location.href='/acesso-hub.html'; return; }
    const [s,r] = await Promise.all([sRes.json(),rRes.json()]);
    if(!s.ok) throw new Error(s.error);
    const secsHtml = (s.secoes||[]).map((sec,i)=>renderSection(sec,i)).join('');
    const comHtml = renderComments(s.comentarios||[]);
    main.innerHTML = renderKpis(s)+secsHtml+comHtml+renderFilters()+renderTable(r.items||[],r.total||0);
    document.getElementById('btnF')?.addEventListener('click',()=>{
      state.from=document.getElementById('fFrom')?.value||state.from;
      state.to=document.getElementById('fTo')?.value||state.to;
      state.tipo=document.getElementById('fTipo')?.value||'';
      state.origem=document.getElementById('fOrigem')?.value||'';
      state.q=document.getElementById('fQ')?.value||'';
      render();
    });
    document.querySelectorAll('.chip-x').forEach(x=>x.addEventListener('click',()=>{
      const k=x.dataset.key;
      if(k==='period'){state.from='';state.to='';}
      else if(k in state)state[k]='';
      render();
    }));
  } catch(e) {
    const errDiv=document.createElement('div');
    errDiv.className='empty';
    errDiv.innerHTML=`Erro ao carregar: ${esc(e.message)}<br><br>`;
    const retryBtn=document.createElement('button');
    retryBtn.className='btn-gold';
    retryBtn.textContent='Tentar novamente';
    retryBtn.addEventListener('click',render);
    errDiv.appendChild(retryBtn);
    main.innerHTML='';
    main.appendChild(errDiv);
  }
}
render();

          <div id="psMsg" class="ps-msg"></div>
        </div>
        <p class="ps-address">Hotel Gran Marquise · Av. Beira Mar, 3980 · Fortaleza-CE · (85) 4006-5000 · www.granmarquise.com.br</p>
      </div>
    </div>`;
  }

  function psUpdateProgress(){
    const idOk = document.getElementById('psNome')?.value?.trim() && document.getElementById('psEmail')?.value?.trim();
    const s1Ok = SEC1_QS.every(q=>psRatings[q.key]);
    const s2Ok = SEC2_QS.every(q=>psRatings[q.key]);
    const s34Ok = psRecomenda && psTipo;
    [idOk,s1Ok,s2Ok,s34Ok].forEach((done,i)=>{
      document.getElementById(`psProg${i+1}`)?.classList.toggle('done',!!done);
    });
  }

  function psOpen(){
    psRatings={}; psRecomenda=null; psTipo=null;
    psOverlay.innerHTML = psBuildModal();
    psOverlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.getElementById('psClose')?.addEventListener('click', psClose);
    psOverlay.addEventListener('click', e=>{ if(e.target===psOverlay) psClose(); });
    psOverlay.querySelectorAll('.ps-face-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const qkey=btn.dataset.qkey, val=btn.dataset.val;
        psRatings[qkey]=val;
        psOverlay.querySelectorAll(`.ps-face-btn[data-qkey="${qkey}"]`).forEach(b=>b.classList.toggle('sel',b.dataset.val===val));
        psUpdateProgress();
      });
    });
    ['psNome','psEmail'].forEach(id=>document.getElementById(id)?.addEventListener('input',psUpdateProgress));
    document.getElementById('psRadioSim')?.addEventListener('click',()=>{
      psRecomenda='sim';
      document.getElementById('psDotSim')?.classList.add('sel');
      document.getElementById('psDotNao')?.classList.remove('sel');
      document.querySelector('#psRadioSim .ps-radio-reveal')?.classList.add('open');
      document.querySelector('#psRadioNao .ps-radio-reveal')?.classList.remove('open');
      psUpdateProgress();
    });
    document.getElementById('psRadioNao')?.addEventListener('click',()=>{
      psRecomenda='nao';
      document.getElementById('psDotNao')?.classList.add('sel');
      document.getElementById('psDotSim')?.classList.remove('sel');
      document.querySelector('#psRadioNao .ps-radio-reveal')?.classList.add('open');
      document.querySelector('#psRadioSim .ps-radio-reveal')?.classList.remove('open');
      psUpdateProgress();
    });
    psOverlay.querySelectorAll('.ps-tipo-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        psTipo=btn.dataset.tipo;
        psOverlay.querySelectorAll('.ps-tipo-btn').forEach(b=>b.classList.toggle('sel',b.dataset.tipo===psTipo));
        psUpdateProgress();
      });
    });
    document.getElementById('psSubmitBtn')?.addEventListener('click', psSubmit);
  }

  function psClose(){
    psOverlay.style.display='none';
    document.body.style.overflow='';
  }

  async function psSubmit(){
    const btn=document.getElementById('psSubmitBtn');
    const msgEl=document.getElementById('psMsg');
    const nome=(document.getElementById('psNome')?.value||'').trim();
    const email=(document.getElementById('psEmail')?.value||'').trim();
    if(!nome||!email){
      msgEl.textContent='Nome e e-mail são obrigatórios.';
      msgEl.className='ps-msg err';
      msgEl.style.display='block';
      return;
    }
    btn.disabled=true;
    msgEl.style.display='none';
    const payload={
      nome, email,
      apto: (document.getElementById('psApto')?.value||'').trim()||null,
      telefone: (document.getElementById('psTel')?.value||'').trim()||null,
      data_tratamento: (document.getElementById('psData')?.value||'').trim()||null,
      tratamento_realizado: (document.getElementById('psTratamento')?.value||'').trim()||null,
      nome_massoterapeuta: (document.getElementById('psMasso')?.value||'').trim()||null,
      ...psRatings,
      servicos_comentario: (document.getElementById('psComSec1')?.value||'').trim()||null,
      instalacoes_comentario: (document.getElementById('psComSec2')?.value||'').trim()||null,
      recomenda: psRecomenda||null,
      recomenda_qual: (document.getElementById('psRecomendaQual')?.value||'').trim()||null,
      recomenda_porque: (document.getElementById('psRecomendaPorque')?.value||'').trim()||null,
      tipo_cliente: psTipo||null,
      origem: 'hospede',
      pesquisa_slug: 'spa-locc-v1',
    };
    try{
      const r=await fetch('/api/nova-resposta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const d=await r.json();
      if(!r.ok||!d.ok) throw new Error(d.error||'Erro desconhecido');
      msgEl.textContent='Pesquisa enviada com sucesso! ✓';
      msgEl.className='ps-msg ok';
      msgEl.style.display='block';
      setTimeout(()=>{ psClose(); render(); },2000);
    } catch(e){
      msgEl.textContent=e.message||'Erro ao enviar pesquisa.';
      msgEl.className='ps-msg err';
      msgEl.style.display='block';
      btn.disabled=false;
    }
  }

  document.getElementById('btnNovaPesquisa')?.addEventListener('click', psOpen);
}
})();
</script>
</body>
</html>
