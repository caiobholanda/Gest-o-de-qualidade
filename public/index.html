<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gestão da Qualidade — Gran Marquise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='5' fill='%239C5843'/><text x='16' y='23' font-size='19' fill='white' font-family='Georgia,serif' text-anchor='middle'>G</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
[data-theme="light"]{
  --bg:#ECE4D2;--surface:#FAF9F5;--surface2:#ECE4D2;
  --header-bg:rgba(236,228,210,0.88);
  --grad1:rgba(156,88,67,.06);--grad2:rgba(156,88,67,.03);
  --border:rgba(122,107,90,.22);--border-soft:rgba(122,107,90,.10);
  --text:#202C28;--muted:#7A6B5A;--muted2:#996442;
  --gold:#9C5843;--gold-dark:#7E4636;--gold-dim:rgba(156,88,67,.12);--gold-dim2:rgba(156,88,67,.06);
  --success:#15705A;--success-dim:rgba(21,112,90,.12);
  --warn:#996442;--warn-dim:rgba(153,100,66,.12);
  --danger:#B85450;--danger-dim:rgba(184,84,80,.10);
}
[data-theme="dark"]{
  --bg:#202C28;--surface:#2E3C38;--surface2:#1A2421;
  --header-bg:rgba(32,44,40,0.88);
  --grad1:rgba(156,88,67,.10);--grad2:rgba(156,88,67,.05);
  --border:rgba(236,228,210,.22);--border-soft:rgba(236,228,210,.10);
  --text:#ECE4D2;--muted:#8A7B6A;--muted2:#C8B89A;
  --gold:#9C5843;--gold-dark:#B26A54;--gold-dim:rgba(156,88,67,.18);--gold-dim2:rgba(156,88,67,.08);
  --success:#25D366;--success-dim:rgba(37,211,102,.16);
  --warn:#996442;--warn-dim:rgba(153,100,66,.18);
  --danger:#D86862;--danger-dim:rgba(216,104,98,.18);
}
html,body{height:100%;font-family:'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(1100px 560px at 12% -4%,var(--grad1),transparent 62%),radial-gradient(900px 520px at 88% 14%,var(--grad2),transparent 60%),var(--bg);color:var(--text);min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:var(--header-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.hdr-brand{position:relative;padding-bottom:6px;display:flex;align-items:center;text-decoration:none}
.hdr-brand::after{content:'';position:absolute;left:0;bottom:0;width:40px;height:2px;background:var(--gold)}
.hdr-brand img{height:30px;width:auto}
[data-theme="dark"] .hdr-brand img{filter:brightness(0) invert(1)}
.hdr-brand em{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-weight:300;font-size:.92rem;color:var(--muted2);margin-left:2px}
.hdr-right{display:flex;align-items:center;gap:18px}
.hdr-ts{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted)}
.btn-icon{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;color:var(--muted2);font-size:.82rem;transition:all .2s}
.btn-icon:hover{border-color:var(--gold);color:var(--gold)}
.btn-sair{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.78rem;font-weight:500;color:var(--muted2);background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;transition:all .2s}
.btn-sair:hover{border-color:var(--gold);color:var(--gold-dark)}
.tabs{display:flex;gap:30px;padding:0 40px;border-bottom:1px solid var(--border-soft);background:var(--header-bg)}
.tab{padding:15px 2px 13px;font-size:.86rem;font-weight:600;color:var(--gold-dark);border-bottom:2px solid var(--gold);margin-bottom:-1px;cursor:pointer}
.main{max-width:1220px;margin:0 auto;padding:44px 40px 80px}
.eyebrow{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:1.55fr 1fr 1fr 1fr 1.2fr;gap:16px;margin-bottom:72px}
.kpi{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;gap:14px}
.kpi.hero{border-radius:14px;border-color:var(--border);padding:26px 28px 22px;box-shadow:0 4px 18px var(--gold-dim)}
.kpi.warn{background:linear-gradient(180deg,var(--gold-dim),transparent 70%),var(--surface);border-color:var(--gold)}
.kpi-label{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.kpi-warn-label{display:flex;align-items:center;gap:8px}
.kpi-warn-dot{width:6px;height:6px;border-radius:50%;background:var(--warn);flex-shrink:0}
.kpi-warn-label .kpi-label{color:var(--gold-dark)}
.kpi-hero-val{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:3.6rem;line-height:1;color:var(--text);margin-top:14px}
.kpi-hero-val span{font-size:1.9rem;color:var(--gold)}
.kpi-hero-line{width:40px;height:3px;background:var(--gold);margin-top:10px}
.kpi-hero-sub{font-size:.74rem;color:var(--muted2);margin-top:10px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-weight:500;font-size:1.9rem;line-height:1;color:var(--text)}
.kpi-val span{font-size:1.2rem;color:var(--muted)}
.kpi-warn-val{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:1.9rem;line-height:1;color:var(--gold-dark)}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:6px}
.kpi-warn-sub{font-size:.68rem;color:var(--muted2);margin-top:6px}
.sec-hdr{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;margin-bottom:6px}
.sec-hdr-left{display:flex;align-items:baseline;gap:18px}
.sec-num{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:300;font-size:3.4rem;line-height:.9;color:var(--gold);opacity:.55}
.sec-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.7rem;color:var(--text);line-height:1.15}
.sec-legend{display:flex;gap:18px;padding-bottom:6px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:.7rem;color:var(--muted)}
.legend-swatch{width:14px;height:8px;border-radius:2px;flex-shrink:0}
.sec-divider{height:1px;background:var(--border-soft);margin-bottom:26px}
.q-list{display:flex;flex-direction:column;margin-bottom:72px}
.q-row{display:grid;grid-template-columns:380px 1fr 130px;align-items:center;gap:32px;padding:18px 14px;border-radius:10px;border-bottom:1px solid var(--border-soft);transition:background .2s}
.q-row:hover{background:var(--surface)}
.q-text{font-size:.92rem;color:var(--text);line-height:1.4}
.q-bar{display:flex;gap:3px;height:12px}
.q-seg{border-radius:3px}
.q-nota{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.4rem;color:var(--text);text-align:right}
.q-resp{font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--muted);margin-top:2px;text-align:right}
.comment-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:72px}
.comment-col-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.comment-cards{display:flex;flex-direction:column;gap:14px}
.comment-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:18px 20px 16px;transition:all .25s}
.comment-card:hover{border-color:var(--border);box-shadow:0 4px 18px var(--gold-dim);transform:translateY(-1px)}
.comment-qm{font-family:'Helvetica Neue',Arial,sans-serif;font-size:1.9rem;line-height:1;color:var(--gold);opacity:.8;margin-bottom:2px}
.comment-text{font-family:'Helvetica Neue',Arial,sans-serif;font-style:italic;font-size:1.05rem;color:var(--text);line-height:1.45;margin-bottom:12px}
.comment-meta{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.comment-meta .mono{font-family:'JetBrains Mono',monospace;letter-spacing:0;text-transform:none}
.filter-label{font-size:.64rem;letter-spacing:.13em;text-transform:uppercase;font-weight:600;color:var(--muted);margin-bottom:14px}
.filter-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:14px;display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;box-shadow:0 4px 18px var(--gold-dim)}
.filter-group{display:flex;flex-direction:column;gap:6px}
.filter-group .fl{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.fi{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:9px 14px}
.fi input,.fi select{background:none;border:none;outline:none;font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;color:var(--text);cursor:pointer}
.fi select option{background:var(--surface);color:var(--text)}
.filter-flex{flex:1;min-width:200px}
.btn-gold{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.82rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:9px;padding:11px 26px;cursor:pointer;transition:background .2s;box-shadow:0 4px 18px var(--gold-dim);align-self:flex-end}
.btn-gold:hover{background:var(--gold-dark)}
.chips{display:flex;gap:8px;margin-bottom:44px;flex-wrap:wrap;min-height:24px}
.chip{display:inline-flex;align-items:center;gap:8px;background:var(--gold-dim);border:1px solid var(--border);border-radius:999px;padding:5px 12px;font-size:.72rem;color:var(--gold-dark);font-weight:500}
.chip-x{cursor:pointer;opacity:.7;transition:opacity .2s}
.chip-x:hover{opacity:1}
.kpis-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.tbl-hdr{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.tbl-title{font-family:'Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:1.35rem;color:var(--text)}
.tbl-count{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--muted)}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 4px 18px var(--gold-dim)}
.tbl-head{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:13px 22px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl-head div{font-size:.62rem;letter-spacing:.11em;text-transform:uppercase;font-weight:600;color:var(--muted)}
.tbl-row{display:grid;grid-template-columns:110px 1.35fr 1.75fr 118px 104px 96px 60px;gap:16px;align-items:center;padding:12px 22px;border-bottom:1px solid var(--border-soft);transition:background .2s;cursor:pointer}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--gold-dim2)}
.tbl-date{font-family:'JetBrains Mono',monospace;font-size:.74rem;color:var(--muted2)}
.tbl-nome{font-size:.86rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-email{font-size:.8rem;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbl-tipo span{display:inline-block;font-size:.68rem;font-weight:500;color:var(--muted2);border:1px solid var(--border);border-radius:999px;padding:3px 10px;background:var(--surface)}
.tbl-orig{font-size:.8rem;color:var(--muted2)}
.score{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.72rem;font-weight:600;border-radius:999px;padding:3px 12px;min-width:34px;text-align:center;border:1px solid transparent}
.score.alto{color:var(--success);background:var(--success-dim)}
.score.medio{color:var(--gold-dark);background:var(--gold-dim)}
.score.baixo{color:var(--danger);background:var(--danger-dim)}
.score.nenhum{color:var(--muted);background:transparent;border-color:var(--border)}
.tbl-ver span{font-size:.78rem;font-weight:600;color:var(--gold-dark);cursor:pointer;border-bottom:1px solid transparent;transition:border-color .2s}
.tbl-ver span:hover{border-bottom-color:var(--gold)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}
@media(max-width:900px){
  .hdr{padding:0 16px}
  .tabs{padding:0 16px;gap:20px}
  .main{padding:24px 16px 60px}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .q-row{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:10px 12px}
  .q-bar{grid-column:1/-1}
  .comment-grid{grid-template-columns:1fr}
  .tbl-head,.tbl-row{grid-template-columns:90px 1fr 60px 46px}
  .tbl-email,.tbl-tipo,.tbl-orig{display:none}
  .sec-legend{flex-wrap:wrap;gap:10px}
  .q-list{margin-bottom:48px}
}
.btn-nova-pesquisa{font-family:'Helvetica Neue',Arial,sans-serif;font-size:.78rem;font-weight:600;color:#ECE4D2;background:var(--gold);border:none;border-radius:8px;padding:7px 16px;cursor:pointer;transition:background .2s;letter-spacing:.04em}
.btn-nova-pesquisa:hover{background:var(--gold-dark)}
#psOverlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);display:none;overflow-y:auto}
.score.warn{color:var(--warn);background:var(--warn-dim)}
#psModal{--bg:#ECE4D2;--bg-alt:#E3DACC;--bg-surf:#F5EFE2;--fg:#1A1A1A;--fg-2:#4A4A4A;--fg-3:#6B6B6B;--fg-4:#9B9B9B;--border:#B8B8B8;--bord-s:#C8B89A;--gold:#9C5843;--gold-s:#996442;--gold-d:#7A4334;--ui:#9C5843;--ui-soft:#996442;--ui-dark:#7A4334;--err:#B85450;background:var(--bg);color:var(--fg);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;width:100%;max-width:820px;margin:0 auto;box-shadow:0 24px 80px rgba(0,0,0,.35);position:relative}
[data-theme="dark"] #psModal{--bg:#202C28;--bg-alt:#293630;--bg-surf:#2F3D38;--fg:#ECE4D2;--fg-2:#C8B89A;--fg-3:#8A7B6A;--fg-4:#6A5E56;--border:#3F524B;--bord-s:#4A5E57;--gold:#C4916A;--gold-s:#B87A52;--gold-d:#B87060;--ui:#C4916A;--ui-soft:#B87A52;--ui-dark:#B87060}
.ps-sticky-hdr{position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 24px 12px;transition:background .6s cubic-bezier(0.16,1,0.3,1)}
.ps-sticky-top{max-width:720px;margin:0 auto 8px;display:flex;align-items:center;justify-content:flex-end}
.ps-close{background:none;border:1px solid var(--border);width:32px;height:32px;border-radius:50%;cursor:pointer;color:var(--fg-3);font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:border-color .2s,color .2s;line-height:1}
.ps-close:hover{border-color:var(--ui);color:var(--ui)}
#psModal .progress-inner{max-width:720px;margin:0 auto;display:flex;gap:8px}
#psModal .trace{height:2px;flex:1;background:var(--bg-alt);overflow:hidden}
#psModal .tf{height:100%;background:var(--ui);width:0;transition:width .4s cubic-bezier(0.16,1,0.3,1)}
#psModal .form-wrap{max-width:720px;margin:0 auto;padding:52px 24px 56px}
@media(min-width:768px){#psModal .form-wrap{max-width:860px;padding:60px 40px 72px}}
#psModal .form-wrap>section,#psModal .form-wrap>header,#psModal .form-wrap>footer{margin-bottom:48px}
@media(min-width:768px){#psModal .form-wrap>section{margin-bottom:60px}}
#psModal .form-title{font-weight:500;font-size:28px;color:var(--fg);letter-spacing:.01em;margin:0 0 22px;text-align:center}
@media(max-width:600px){#psModal .form-title{font-size:23px}}
#psModal .form-intro{font-size:14.5px;line-height:1.75;color:var(--fg-2);max-width:620px;margin:0 auto 14px;text-align:center}
#psModal .form-intro.en{font-size:13px;color:var(--fg-3);font-style:italic}
#psModal .en{font-style:italic;color:var(--fg-3)}
#psModal .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:30px 40px}
#psModal .field-full{grid-column:1/-1}
#psModal .field{position:relative}
#psModal .field label{display:block;margin-bottom:5px;line-height:1.3}
#psModal .field-label-pt{font-size:13.5px;color:var(--fg-2);letter-spacing:.005em}
#psModal .field-label-en{font-style:italic;color:var(--fg-3);font-size:12px}
#psModal .field input{width:100%;background:transparent;border:0;border-bottom:1px solid var(--border);padding:8px 2px;font-size:16px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--fg);outline:none;transition:border-color .5s cubic-bezier(0.16,1,0.3,1)}
#psModal .field input::placeholder{color:var(--border)}
#psModal .fill{position:absolute;left:0;right:0;bottom:0;height:2px;background:var(--ui-soft);transform:scaleX(0);transform-origin:center;transition:transform .5s cubic-bezier(0.16,1,0.3,1)}
#psModal .field:focus-within .fill{transform:scaleX(1)}
#psModal .comment-field{margin-top:24px}
#psModal .sec-heading{display:flex;align-items:baseline;flex-wrap:wrap;gap:0 14px;margin-bottom:26px}
#psModal .sec-num{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--ui);letter-spacing:.1em}
#psModal .sec-title{font-weight:500;font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--fg)}
#psModal .sec-title-en{font-size:14px;letter-spacing:.08em}
#psModal .scale-bar{background:var(--gold);min-height:56px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 22px;flex-wrap:wrap;margin-bottom:8px}
#psModal .scale-bar-title{color:#fff;font-weight:500;font-size:16px;display:flex;flex-direction:column;line-height:1.25}
#psModal .scale-bar-legend{display:flex;gap:18px}
#psModal .scale-legend-item{display:flex;flex-direction:column;align-items:center;gap:3px}
#psModal .scale-legend-label{display:flex;flex-direction:column;align-items:center;color:#fff;font-size:11.5px;font-weight:500;line-height:1.2}
@media(max-width:600px){#psModal .scale-bar-legend{gap:10px}}
#psModal .rating-list{display:flex;flex-direction:column}
#psModal .rating-row{display:flex;align-items:center;justify-content:space-between;gap:24px;padding:14px 0;border-bottom:1px solid var(--bg-alt)}
#psModal .rating-text{flex:1;line-height:1.55}
#psModal .rating-smileys{display:flex;gap:6px;flex:none}
#psModal .smiley-btn{display:flex;align-items:center;justify-content:center;padding:6px;border:1px solid transparent;border-radius:9999px;background:none;cursor:pointer;transition:border-color .35s cubic-bezier(0.16,1,0.3,1)}
#psModal .smiley-btn:hover{border-color:var(--ui-soft)}
#psModal .smiley-btn.selected{border-color:var(--gold)}
#psModal .smiley-btn.selected svg{animation:psSmBounce .25s cubic-bezier(0.16,1,0.3,1)}
@keyframes psSmBounce{0%{transform:translateY(0)}45%{transform:translateY(-3px)}100%{transform:translateY(0)}}
#psModal .radio-list{display:flex;flex-direction:column;gap:16px}
#psModal .radio-opt{display:flex;align-items:flex-start;gap:14px;background:none;border:0;cursor:pointer;font-size:16px;color:var(--fg);padding:6px 0;text-align:left;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;line-height:1.5;width:100%}
#psModal .radio-dot{width:18px;height:18px;border-radius:9999px;border:1.5px solid var(--border);position:relative;flex:none;margin-top:2px;transition:border-color .35s cubic-bezier(0.16,1,0.3,1)}
#psModal .radio-dot.on{border-color:var(--ui)}
#psModal .radio-dot.on::after{content:'';position:absolute;inset:3px;border-radius:9999px;background:var(--ui);animation:psDotIn .25s cubic-bezier(0.16,1,0.3,1)}
@keyframes psDotIn{from{transform:scale(0)}to{transform:scale(1)}}
#psModal .inline-reveal{margin:10px 0 6px 30px;max-width:440px}
#psModal .client-type{display:flex;gap:44px;flex-wrap:wrap}
#psModal .submit-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:56px;gap:14px}
#psModal .submit-btn{position:relative;overflow:hidden;height:56px;width:280px;max-width:100%;background:var(--ui);color:#fff;border:0;cursor:pointer;font-size:14px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;transition:background-color .4s cubic-bezier(0.16,1,0.3,1),opacity .3s}
#psModal .submit-btn:hover:not(:disabled){background:var(--ui-dark)}
#psModal .submit-btn:disabled{opacity:.6;cursor:not-allowed}
#psModal .submit-btn::after{content:'';position:absolute;left:0;bottom:0;height:1px;width:100%;background:#fff;transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(0.16,1,0.3,1)}
#psModal .submit-btn:hover:not(:disabled)::after{transform:scaleX(1)}
#psModal .submit-err{color:var(--err);font-size:13.5px;text-align:center;display:none}
#psModal .form-foot{font-size:15px;line-height:1.7;color:var(--fg-2);text-align:center}
#psModal .page-foot{text-align:center;font-size:11.5px;color:var(--muted);line-height:1.8;margin-top:32px}
@media(max-width:680px){
  #psModal .form-wrap{padding:32px 18px 60px}
  #psModal .field-grid{grid-template-columns:1fr;gap:26px}
  #psModal .rating-row{flex-direction:column;align-items:flex-start;gap:14px}
  #psModal .rating-smileys{gap:14px}
  #psModal .client-type{flex-direction:column;gap:12px}
  #psModal .scale-bar-legend{gap:10px}
}

  .hdr{padding:0 14px;height:54px}
  .hdr-brand em{display:none}
  .hdr-ts{display:none}
  .hdr-right{gap:10px}
  .btn-sair{padding:6px 10px;font-size:.72rem}
  .tabs{padding:0 14px;gap:16px}
  .tab{font-size:.78rem;padding:12px 2px 10px}
  .main{padding:18px 14px 56px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:44px}
  .kpi.hero{grid-column:1/-1}
  .kpi-hero-val{font-size:2.6rem}
  .kpi{padding:16px 16px}
  .sec-num{font-size:2.2rem}
  .sec-title{font-size:1.25rem}
  .sec-legend{display:none}
  .q-row{padding:12px 10px;gap:8px 10px}
  .q-text{font-size:.84rem}
  .q-nota{font-size:1.15rem}
  .q-list{margin-bottom:40px}
  .comment-grid{margin-bottom:44px}
  .filter-box{padding:14px 12px;gap:10px}
  .filter-group{width:100%}
  .fi{width:100%}
  .btn-gold{width:100%;text-align:center}
  .chips{margin-bottom:28px}
  .tbl-head,.tbl-row{grid-template-columns:78px 1fr 54px}
  .tbl-ver{display:none}
  .tbl-wrap{border-radius:10px}
}
#psModal .btn-mark-all{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--bord-s);border-radius:9999px;padding:7px 18px;font-size:12px;font-weight:500;color:var(--gold-s);cursor:pointer;transition:all .25s;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:.04em;flex-shrink:0}
#psModal .btn-mark-all:hover{background:var(--gold-d);border-color:var(--gold-d);color:#fff}
#psModal .ps-field-err{font-size:11.5px;color:var(--err);margin-top:5px;display:none;line-height:1.3}
#psModal .ps-combo{position:relative}
#psModal .ps-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg-surf);border:1px solid var(--bord-s);border-radius:9px;box-shadow:0 8px 28px rgba(0,0,0,.2);max-height:220px;overflow-y:auto;z-index:30}
#psModal .ps-dropdown-item{padding:10px 16px;font-size:14.5px;color:var(--fg);cursor:pointer;transition:background .15s;border-bottom:1px solid var(--bg-alt)}
#psModal .ps-dropdown-item:last-child{border-bottom:none}
#psModal .ps-dropdown-item:hover{background:var(--gold-d);color:#fff}
#psModal .ps-dropdown-empty{padding:10px 16px;font-size:13.5px;color:var(--fg-3);font-style:italic}

<body data-theme="light">

<header class="hdr">
  <div style="display:flex;align-items:center">
    <a class="hdr-brand" href="https://hub-granmarquise.fly.dev" target="_blank" rel="noopener">
      <img src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
      <em> · Gestão da Qualidade</em>
    </a>
  </div>
  <div class="hdr-right">
    <span class="hdr-ts" id="ts"></span>
    <button class="btn-nova-pesquisa" id="btnNovaPesquisa">+ Nova Pesquisa</button>
    <button class="btn-icon" id="btnTheme" title="Alternar tema">☾</button>
    <button class="btn-sair" onclick="location.href='/api/logout'">Sair</button>
  </div>
</header>

<div class="tabs"><div class="tab">Avaliações</div></div>

<main class="main" id="main"><div class="empty">Carregando...</div></main>

<script>
(function(){
'use strict';
const body = document.body;
const saved = localStorage.getItem('gq_theme') || (document.cookie.match(/(?:^|;\s*)gq_theme=([^;]+)/)||[])[1] || 'light';
body.setAttribute('data-theme', saved);
const btn = document.getElementById('btnTheme');
btn.textContent = saved === 'dark' ? '☀' : '☾';
btn.onclick = () => {
  const t = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', t);
  localStorage.setItem('gq_theme', t);
  btn.textContent = t === 'dark' ? '☀' : '☾';
};

function updateTs() {
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  document.getElementById('ts').textContent =
    `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()} · ${pad(now.getHours())}:${pad(now.getMinutes())}`;
}
updateTs(); setInterval(updateTs, 60000);

const LIMIT=20;
const state = { from:'', to:'', tipo:'', origem:'', q:'', page:1, totalPages:1, periodCustom:false };
(function(){
  try {
    const s=JSON.parse(localStorage.getItem('gq_filters')||'{}');
    ['from','to','tipo','origem','q','periodCustom'].forEach(k=>{ if(k in s) state[k]=s[k]; });
    if(s.page) state.page=s.page;
  } catch(e){}
})();

function esc(s){ const d=document.createElement('div');d.textContent=s||'';return d.innerHTML; }
function scoreClass(s){ if(s==='—')return'nenhum'; const n=parseInt(s); if(n>=85)return'alto'; if(n>=60)return'medio'; return'baixo'; }

const _RATINGS=[{key:'otimo',pt:'Ótimo',type:'great'},{key:'bom',pt:'Bom',type:'good'},{key:'regular',pt:'Regular',type:'fair'},{key:'ruim',pt:'Ruim',type:'poor'}];
const _MOUTHS={great:'M11.5 23 Q20 33 28.5 23',good:'M12.5 24.5 Q20 29.5 27.5 24.5',fair:'M13 26 H27',poor:'M12.5 28.5 Q20 22.5 27.5 28.5'};
const _SEC1=[{key:'servicos_expectativa',pt:'A expectativa do tratamento'},{key:'servicos_explicacao',pt:'Explicação sobre benefícios e procedimentos'},{key:'servicos_atitude',pt:'Atitude e qualidade dos serviços'},{key:'servicos_tecnica',pt:'Técnica e habilidade da massoterapeuta'}];
const _SEC2=[{key:'instalacoes_conforto',pt:'Conforto e conservação do SPA'},{key:'instalacoes_organizacao',pt:'Organização e atmosfera do ambiente'},{key:'instalacoes_conveniencia',pt:'Itens de conveniência (roupões, toalhas)'}];
function _smly(type,filled,size,color){color=color||'#9A9A9A';const stroke=filled?'#fff':color,fill=filled?'var(--gold)':'none';return `<svg viewBox="0 0 40 40" width="${size}" height="${size}" fill="none"><circle cx="20" cy="20" r="17" fill="${fill}" stroke="${stroke}" stroke-width="2"/><circle cx="14.6" cy="16.4" r="1.7" fill="${stroke}"/><circle cx="25.4" cy="16.4" r="1.7" fill="${stroke}"/><path d="${_MOUTHS[type]}" stroke="${stroke}" stroke-width="2" stroke-linecap="round"/></svg>`;}

let _detOverlay=null, _detEscHandler=null;
function detClose(){
  if(!_detOverlay)return;
  _detOverlay.style.display='none';
  document.body.style.overflow='';
  if(_detEscHandler){document.removeEventListener('keydown',_detEscHandler);_detEscHandler=null;}
}
async function openDetail(id){
  if(!_detOverlay){
    _detOverlay=document.createElement('div');
    _detOverlay.style.cssText='position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);overflow-y:auto;padding:40px 16px 80px';
    _detOverlay.setAttribute('tabindex','-1');
    document.body.appendChild(_detOverlay);
  }
  if(_detEscHandler)document.removeEventListener('keydown',_detEscHandler);
  _detEscHandler=e=>{if(e.key==='Escape')detClose();};
  document.addEventListener('keydown',_detEscHandler);
  _detOverlay.style.display='block';
  _detOverlay.scrollTop=0;
  document.body.style.overflow='hidden';
  _detOverlay.focus();
  const closeBtn=`<button id="detCloseBtn" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;color:var(--muted);font-size:.85rem;display:flex;align-items:center;justify-content:center;flex:none">✕</button>`;
  _detOverlay.innerHTML=`<div style="background:var(--surface);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:100%;max-width:800px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35)"><div style="display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border-soft)">${closeBtn}</div><div class="empty" style="padding:60px 24px">Carregando...</div></div>`;
  _detOverlay.querySelector('#detCloseBtn')?.addEventListener('click',detClose);
  try{
    const r=await fetch(`/api/resposta/${id}`);
    const data=await r.json();
    if(!data.ok)throw new Error(data.error||'Erro');
    const it=data.item;
    const dtFmt=s=>s?s.slice(0,10).split('-').reverse().join('/'):'—';
    const tipoLabel={lazer:'Lazer',negocios:'Negócios',evento:'Evento',passante:'Passante',hospede:'Hóspede'};
    const scaleBar=`<div style="background:var(--gold);display:flex;align-items:center;gap:16px;padding:9px 0;margin-bottom:0;border-radius:8px 8px 0 0"><div style="flex:1"></div><div style="display:flex;gap:6px;padding-right:2px">${_RATINGS.map(rt=>`<div style="width:38px;display:flex;flex-direction:column;align-items:center;gap:3px">${_smly(rt.type,false,26,'#fff')}<span style="color:#fff;font-size:9px;font-weight:600;letter-spacing:.04em">${rt.pt}</span></div>`).join('')}</div></div>`;
    const rRow=(qpt,val)=>`<div style="display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-soft)"><span style="font-size:.88rem;color:var(--text);line-height:1.45;flex:1">${esc(qpt)}</span><div style="display:flex;gap:6px;padding-right:2px">${_RATINGS.map(rt=>`<div style="width:38px;display:flex;justify-content:center">${_smly(rt.type,rt.key===val,36)}</div>`).join('')}</div></div>`;
    const rSec=(num,label,qs,comment)=>`<div style="margin-bottom:60px"><div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.1em">${num}</span><span style="font-weight:500;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)">${label}</span></div>${scaleBar}${qs.map(q=>rRow(q.pt,it[q.key])).join('')}${comment?`<div style="padding:10px 0 2px;font-style:italic;color:var(--muted2);font-size:.87rem;border-top:1px solid var(--border-soft);margin-top:2px">"${esc(comment)}"</div>`:''}</div>`;
    const rRadio=(sel,label,sub)=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:7px 0"><div style="width:18px;height:18px;border-radius:50%;border:1.5px solid ${sel?'var(--gold)':'var(--border)'};position:relative;flex:none;margin-top:2px">${sel?`<div style="position:absolute;inset:3px;border-radius:50%;background:var(--gold)"></div>`:''}</div><div><span style="font-size:.93rem;color:var(--text)">${esc(label)}</span>${sub?`<span style="color:var(--muted2);font-size:.88rem"> — ${esc(sub)}</span>`:''}</div></div>`;
    const bars=[1,2,3,4].map(()=>`<div style="flex:1;height:2px;background:var(--gold);border-radius:2px"></div>`).join('');
    _detOverlay.innerHTML=`<div style="background:var(--surface);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;width:100%;max-width:800px;margin:0 auto;border-radius:16px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35)">
      <div style="position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--border-soft);padding:12px 24px 10px;display:flex;align-items:center;justify-content:space-between">
        <div class="eyebrow">Avaliação #${id}</div>${closeBtn}
      </div>
      <div style="display:flex;gap:6px;padding:0 24px">${bars}</div>
      <div style="max-width:720px;margin:0 auto;padding:40px 32px 80px">
        <div style="margin-bottom:52px">
          <div style="font-weight:500;font-size:1.3rem;color:var(--text);margin-bottom:5px">${esc(it.nome||'Sem nome')}</div>
          <div style="font-size:.82rem;color:var(--muted2)">${esc(it.email||'—')} · ${esc(tipoLabel[it.tipo_cliente]||it.tipo_cliente||'—')} · ${esc(dtFmt(it.submitted_at))}</div>
          ${it.nome_massoterapeuta?`<div style="font-size:.8rem;color:var(--muted);margin-top:10px">Massoterapeuta: <strong style="color:var(--text)">${esc(it.nome_massoterapeuta)}</strong>${it.tratamento_realizado?` &nbsp;·&nbsp; Tratamento: <strong style="color:var(--text)">${esc(it.tratamento_realizado)}</strong>`:''}</div>`:''}
          ${it.controle_interno?`<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Controle interno: <strong style="color:var(--text)">${esc(it.controle_interno)}</strong></div>`:''}
          ${it.inserido_por?`<div style="font-size:.8rem;color:var(--muted);margin-top:8px">Inserido por: <strong style="color:var(--text)">${esc(it.inserido_por)}</strong> em ${it.submitted_at?dtFmt(it.submitted_at)+' '+it.submitted_at.slice(11,16):'—'}</div>`:''}
        </div>
        ${rSec('01','SERVIÇOS',_SEC1,it.servicos_comentario)}
        ${rSec('02','INSTALAÇÕES',_SEC2,it.instalacoes_comentario)}
        <div style="margin-bottom:60px">
          <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.1em">03</span><span style="font-weight:500;font-size:14px;letter-spacing:.13em;text-transform:uppercase;color:var(--text)">VOCÊ RECOMENDARIA ALGUM TRATAMENTO EM PARTICULAR?</span></div>
          ${rRadio(it.recomenda==='sim','Sim',it.recomenda_qual||null)}
          ${rRadio(it.recomenda==='nao','Não',it.recomenda_porque||null)}
        </div>
        <div style="margin-bottom:32px">
          <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:18px"><span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--gold);letter-spacing:.1em">04</span><span style="font-weight:500;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--text)">TIPO DE CLIENTE</span></div>
          <div style="display:flex;gap:28px;flex-wrap:wrap">${['lazer','negocios','evento'].map(t=>rRadio(it.tipo_cliente===t,tipoLabel[t]||t,null)).join('')}</div>
        </div>
      </div>
    </div>`;
    _detOverlay.querySelector('#detCloseBtn')?.addEventListener('click',detClose);
  }catch(e){
    _detOverlay.innerHTML=`<div style="background:var(--surface);border-radius:16px;width:100%;max-width:700px;margin:0 auto;padding:36px;text-align:center"><div class="empty">Erro ao carregar: ${esc(e.message)}</div><button class="btn-gold" style="margin:16px auto;display:block" id="detCloseBtn2">Fechar</button></div>`;
    _detOverlay.querySelector('#detCloseBtn2')?.addEventListener('click',detClose);
  }
}

function buildSegs(dist){
  const {otimo=0,bom=0,regular=0,ruim=0}=dist, tot=otimo+bom+regular+ruim||1, segs=[];
  if(otimo)segs.push({w:otimo/tot*100,bg:'var(--success)',tip:`Ótimo: ${otimo}`});
  if(bom)segs.push({w:bom/tot*100,bg:'var(--gold)',tip:`Bom: ${bom}`});
  if(regular)segs.push({w:regular/tot*100,bg:'var(--warn-dim)',bdr:'1px solid var(--gold)',tip:`Regular: ${regular}`});
  if(ruim)segs.push({w:ruim/tot*100,bg:'var(--danger)',tip:`À Melhorar: ${ruim}`});
  if(!segs.length)segs.push({w:100,bg:'var(--border-soft)',tip:'Sem dados'});
  return segs;
}

function legend(){
  return `<div class="sec-legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--success)"></span>Ótimo</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--gold)"></span>Bom</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--warn-dim);border:1px solid var(--gold)"></span>Regular</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--danger)"></span>À Melhorar</div>
  </div>`;
}

function renderSection(sec, i){
  const num = String(i+1).padStart(2,'0');
  const qs = sec.perguntas.map(q => {
    const segs = buildSegs(q.distribuicao);
    return `<div class="q-row">
      <div class="q-text">${esc(q.texto)}</div>
      <div class="q-bar">${segs.map(s=>`<div class="q-seg" style="flex:${s.w} 1 0%;background:${s.bg};${s.bdr?'border:'+s.bdr:''}" title="${esc(s.tip)}"></div>`).join('')}</div>
      <div><div class="q-nota">${esc(q.nota)}</div><div class="q-resp">${q.respostas} resp.</div></div>
    </div>`;
  }).join('');
  return `<div class="sec-hdr">
    <div class="sec-hdr-left">
      <div class="sec-num">${num}</div>
      <div><div class="eyebrow">Seção</div><div class="sec-title">${esc(sec.titulo)}</div></div>
    </div>
    ${i===0?legend():''}
  </div>
  <div class="sec-divider"></div>
  <div class="q-list">${qs||'<div class="empty">Sem respostas no período</div>'}</div>`;
}

function renderComments(coms, secCount){
  if(!coms.length)return'';
  const cols = coms.map(g=>`<div>
    <div class="comment-col-label">${esc(g.label)}</div>
    <div class="comment-cards">${g.itens.map(qt=>`<div class="comment-card">
      <div class="comment-qm">"</div>
      <div class="comment-text">${esc(qt.text)}</div>
      <div class="comment-meta">${esc(qt.author)} · <span class="mono">${esc(qt.date)}</span></div>
    </div>`).join('')}</div>
  </div>`).join('');
  const numSec = String((secCount||0)+1).padStart(2,'0');
  return `<div class="sec-hdr"><div class="sec-hdr-left">
    <div class="sec-num">${numSec}</div>
    <div><div class="eyebrow">Seção</div><div class="sec-title">Comentários &amp; Respostas</div></div>
  </div></div>
  <div class="sec-divider"></div>
  <div class="comment-grid">${cols}</div>`;
}

function _defaultPeriod(){
  const now=new Date(),pad=n=>String(n).padStart(2,'0'),fmt=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  const today=fmt(now);
  return {defFrom:today,defTo:today};
}
function renderFilters(){
  const chips = [];
  if(state.periodCustom&&state.from) chips.push({l:`Data: ${state.from.split('-').reverse().join('/')}`,k:'period'});
  const _tipoLabel={lazer:'Lazer',negocios:'Negócios',evento:'Evento',passante:'Passante',hospede:'Hóspede'};
  const _origemLabel={hospede:'Hóspede',colaborador:'Colaborador'};
  if(state.tipo) chips.push({l:`Tipo: ${_tipoLabel[state.tipo]||state.tipo}`,k:'tipo'});
  if(state.origem) chips.push({l:`Origem: ${_origemLabel[state.origem]||state.origem}`,k:'origem'});
  if(state.q) chips.push({l:`Busca: ${state.q}`,k:'q'});
  return `<div class="filter-label">Filtros</div>
  <div class="filter-box">
    <div class="filter-group">
      <span class="fl">Data</span>
      <div class="fi"><input type="date" id="fDate" value="${state.from}" max="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="filter-group">
      <span class="fl">Origem</span>
      <div class="fi"><select id="fOrigem">
        <option value="">Todas</option>
        <option value="hospede" ${state.origem==='hospede'?'selected':''}>Hóspede</option>
        <option value="colaborador" ${state.origem==='colaborador'?'selected':''}>Colaborador</option>
      </select></div>
    </div>
    <div class="filter-group">
      <span class="fl">Tipo</span>
      <div class="fi"><select id="fTipo">
        <option value="">Todos</option>
        <option value="lazer" ${state.tipo==='lazer'?'selected':''}>Lazer</option>
        <option value="negocios" ${state.tipo==='negocios'?'selected':''}>Negócios</option>
        <option value="evento" ${state.tipo==='evento'?'selected':''}>Evento</option>
        <option value="passante" ${state.tipo==='passante'?'selected':''}>Passante</option>
        <option value="hospede" ${state.tipo==='hospede'?'selected':''}>Hóspede</option>
      </select></div>
    </div>
    <div class="filter-group filter-flex">
      <span class="fl">Busca</span>
      <div class="fi">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.5" y2="16.5"/></svg>
        <input type="text" id="fQ" placeholder="Nome ou e-mail…" value="${esc(state.q)}" style="flex:1">
      </div>
    </div>
    <button class="btn-gold" id="btnF">Filtrar</button>
  </div>
  <div class="chips" id="chips">${chips.map(c=>`<div class="chip">${esc(c.l)}<span class="chip-x" data-key="${c.k}">✕</span></div>`).join('')}</div>`;
}

function renderTable(rows, total, page){
  const rHtml = rows.map(r=>`<div class="tbl-row" data-id="${r.id}">
    <div class="tbl-date">${esc(r.date)}</div>
    <div class="tbl-nome">${esc(r.nome)}</div>
    <div class="tbl-email">${esc(r.email)}</div>

async function render(trigger){
  try { localStorage.setItem('gq_filters',JSON.stringify({from:state.from,to:state.to,tipo:state.tipo,origem:state.origem,q:state.q,page:state.page,periodCustom:state.periodCustom})); } catch(e){}
  if(_renderCtrl)_renderCtrl.abort();
  _renderCtrl=new AbortController();
  const {signal}=_renderCtrl;
  const isAuto=!trigger;
  const savedScrollY=window.scrollY;
  const main=document.getElementById('main');
  main.style.opacity='0.5';
  main.style.pointerEvents='none';
  try {
    const qs=new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem});
    const qr=new URLSearchParams({slug:'spa-locc-v1',from:state.from,to:state.to,tipo:state.tipo,origem:state.origem,q:state.q,page:state.page,limit:LIMIT});
    const [sRes,rRes]=await Promise.all([fetch('/api/stats?'+qs,{signal}),fetch('/api/respostas?'+qr,{signal})]);
    if(sRes.status===401||rRes.status===401){location.href='/acesso-hub.html';return;}
    const [s,r]=await Promise.all([sRes.json(),rRes.json()]);
    if(!s.ok)throw new Error(s.error);
    const secoes=s.secoes||[];
    const secsHtml=secoes.map((sec,i)=>renderSection(sec,i)).join('');
    const comHtml=renderComments(s.comentarios||[],secoes.length);
    state.totalPages=Math.ceil((r.total||0)/LIMIT)||1;
    main.innerHTML=renderKpis(s)+secsHtml+comHtml+renderFilters()+renderTable(r.items||[],r.total||0,state.page);
    main.style.opacity='';
    main.style.pointerEvents='';
    if(isAuto){
      window.scrollTo({top:savedScrollY,behavior:'instant'});
    } else if(trigger==='filter'||trigger==='chip'||trigger==='page'){
      document.querySelector('.tbl-hdr')?.scrollIntoView({behavior:'smooth',block:'start'});
    }
    document.getElementById('btnF')?.addEventListener('click',()=>{
      const d=document.getElementById('fDate')?.value||'';
      state.from=state.to=d;
      state.periodCustom=!!d;
      state.tipo=document.getElementById('fTipo')?.value||'';
      state.origem=document.getElementById('fOrigem')?.value||'';
      state.q=document.getElementById('fQ')?.value||'';
      state.page=1;
      render('filter');
    });
    document.getElementById('fQ')?.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      const d=document.getElementById('fDate')?.value||'';
      state.from=state.to=d;
      state.periodCustom=!!d;
      state.tipo=document.getElementById('fTipo')?.value||'';
      state.origem=document.getElementById('fOrigem')?.value||'';
      state.q=document.getElementById('fQ').value||'';
      state.page=1;
      render('filter');
    });
    document.querySelectorAll('.chip-x').forEach(x=>x.addEventListener('click',()=>{
      const k=x.dataset.key;
      if(k==='period'){
        state.from=state.to='';
        state.periodCustom=false;
      } else if(k in state)state[k]='';
      state.page=1;
      render('chip');
    }));
    document.getElementById('pgPrev')?.addEventListener('click',()=>{if(state.page>1){state.page--;render('page');}});
    document.getElementById('pgNext')?.addEventListener('click',()=>{if(state.page<state.totalPages){state.page++;render('page');}});
    document.querySelectorAll('.tbl-row').forEach(row=>row.addEventListener('click',()=>{
      const id=parseInt(row.dataset.id);
      if(id)openDetail(id);
    }));
  } catch(e) {
    if(e.name==='AbortError')return;
    main.style.opacity='';
    main.style.pointerEvents='';
    const errDiv=document.createElement('div');
    errDiv.className='empty';
    errDiv.innerHTML=`Erro ao carregar: ${esc(e.message)}<br><br>`;
    const retryBtn=document.createElement('button');
    retryBtn.className='btn-gold';
    retryBtn.textContent='Tentar novamente';
    retryBtn.addEventListener('click',()=>render('retry'));
    errDiv.appendChild(retryBtn);
    main.innerHTML='';
    main.appendChild(errDiv);
  }
}

    function showList(filter){
      const q=(filter||'').toLowerCase().trim();
      const matches=q?items.filter(n=>startOnly?n.toLowerCase().startsWith(q):n.toLowerCase().includes(q)):items;
      if(!matches.length){lst.innerHTML=`<div class="ps-dropdown-empty">Nenhum resultado</div>`;lst.style.display='block';return;}
      lst.innerHTML=matches.map(n=>`<div class="ps-dropdown-item">${esc(n)}</div>`).join('');
      lst.style.display='block';
      lst.querySelectorAll('.ps-dropdown-item').forEach(el=>el.addEventListener('mousedown',e=>{
        e.preventDefault();
        inp.value=el.textContent;
        lst.style.display='none';
        const errEl=document.getElementById(inputId+'Err');
        if(errEl)errEl.style.display='none';
      }));
    }
    inp.addEventListener('focus',()=>{ if(!startOnly||inp.value.trim())showList(inp.value); });
    inp.addEventListener('input',()=>showList(inp.value));
    inp.addEventListener('blur',()=>setTimeout(()=>{lst.style.display='none';},150));

            b.classList.toggle('selected',sel);
            b.innerHTML=psSmiley(b.dataset.type,sel,36);
          });
        }
        psUpdateProgress();
      });
    });
    ['psNome','psEmail'].forEach(id=>document.getElementById(id)?.addEventListener('input',psUpdateProgress));
    document.getElementById('psApto')?.addEventListener('input',()=>{ psUpdateProgress(); });
    document.getElementById('psApto')?.addEventListener('blur',()=>setTimeout(()=>psValidateApto(),200));
    document.getElementById('psControleInterno')?.addEventListener('input',e=>{ e.target.value=e.target.value.replace(/\D/g,''); });
    document.getElementById('psTel')?.addEventListener('input',e=>{ e.target.value=e.target.value.replace(/[^\d+\s()\-]/g,''); psValidateTel(); });
    document.getElementById('psEmail')?.addEventListener('input',()=>{ psValidateEmail(); psUpdateProgress(); });
    document.getElementById('psRadioSim')?.addEventListener('click',()=>{
      psRecomenda='sim';
      document.getElementById('psDotSim')?.classList.add('on');
      document.getElementById('psDotNao')?.classList.remove('on');
      const rS=document.getElementById('psRevSim'),rN=document.getElementById('psRevNao');
      if(rS)rS.style.display='block'; if(rN)rN.style.display='none';
      psUpdateProgress();
    });
    document.getElementById('psRadioNao')?.addEventListener('click',()=>{
      psRecomenda='nao';
      document.getElementById('psDotNao')?.classList.add('on');
      document.getElementById('psDotSim')?.classList.remove('on');
      const rS=document.getElementById('psRevSim'),rN=document.getElementById('psRevNao');
      if(rS)rS.style.display='none'; if(rN)rN.style.display='block';
      psUpdateProgress();
    });
    psOverlay.querySelectorAll('[data-tipo]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        psTipo=btn.dataset.tipo;
        psOverlay.querySelectorAll('[data-tipo]').forEach(b=>{
          const dot=b.querySelector('.radio-dot');
          if(dot)dot.classList.toggle('on',b.dataset.tipo===psTipo);
        });
        psUpdateProgress();
      });
    });
document.getElementById('psSubmitBtn')?.addEventListener('click',psSubmit);
    psOverlay.querySelectorAll('.ps-mark-all').forEach(btn=>btn.addEventListener('click',()=>psMarkAll(btn.dataset.nota)));
    psLoadLists().then(()=>{
      if(!document.getElementById('psMasso'))return;
      psBindCombo('psMasso','psMassoList',psMassos);
      psBindCombo('psTratamento','psTratamentoList',psTratamentos);
      psBindCombo('psApto','psAptoList',psAptos.map(String),true);
    });
  }

  function psClose(){psOverlay.style.display='none';document.body.style.overflow='';}

  async function psSubmit(){
    const btn=document.getElementById('psSubmitBtn'),msgEl=document.getElementById('psMsg');
    const nome=(document.getElementById('psNome')?.value||'').trim();
    const email=(document.getElementById('psEmail')?.value||'').trim();
    if(!nome||!email){msgEl.textContent='Nome e e-mail são obrigatórios.';msgEl.style.display='block';return;}
    if(!psValidateEmail()){msgEl.textContent='E-mail inválido.';msgEl.style.display='block';return;}
    if(!psValidateTel()){msgEl.textContent='Telefone inválido. Ex: 85 99999-9999';msgEl.style.display='block';return;}
    if(!psValidateApto()){msgEl.textContent='Corrija o Nº do Apto antes de enviar.';msgEl.style.display='block';return;}
    const _dataTrat=(document.getElementById('psData')?.value||'').trim();
    if(_dataTrat&&_dataTrat>psToday()){msgEl.textContent='A data do tratamento não pode ser futura.';msgEl.style.display='block';return;}
    btn.disabled=true; msgEl.style.display='none';
    try {
      const payload={
        nome,email,
        apto:(document.getElementById('psApto')?.value||'').trim()||null,
        controle_interno:(document.getElementById('psControleInterno')?.value||'').trim()||null,
        telefone:(document.getElementById('psTel')?.value||'').trim()||null,
        data_tratamento:(document.getElementById('psData')?.value||'').trim()||null,
        tratamento_realizado:(document.getElementById('psTratamento')?.value||'').trim()||null,
        nome_massoterapeuta:(document.getElementById('psMasso')?.value||'').trim()||null,
        ...psRatings,
        servicos_comentario:(document.getElementById('psComSec1')?.value||'').trim()||null,
        instalacoes_comentario:(document.getElementById('psComSec2')?.value||'').trim()||null,
        recomenda:psRecomenda||null,
        recomenda_qual:psRecomenda==='sim'?(document.getElementById('psRecomendaQual')?.value||'').trim()||null:null,
        recomenda_porque:psRecomenda==='nao'?(document.getElementById('psRecomendaPorque')?.value||'').trim()||null:null,
        tipo_cliente:psTipo||'lazer',
        origem:'colaborador',
        pesquisa_slug:'spa-locc-v1',
        app_origem:'gestao-qualidade',
      };
      const r=await fetch('/api/nova-resposta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      const data=await r.json();
      if(!data.ok) throw new Error(data.error||'Erro ao enviar');
      msgEl.textContent='Pesquisa enviada com sucesso! ✓';
      msgEl.style.color='#15705A';
      msgEl.style.display='block';
      setTimeout(()=>{render();psOpen();},1800);
    } catch(e){
      msgEl.textContent=`Erro: ${e.message}`;
      msgEl.style.color='var(--danger)';
      msgEl.style.display='block';
      btn.disabled=false;
    }
  }

  document.getElementById('btnNovaPesquisa')?.addEventListener('click',psOpen);
}
})();
</script>
</body>
</html>
